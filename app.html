<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Illiberis Manager</title>
<style>



*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;font-size:14px;background:#f5f4f0}
.app{display:flex;min-height:100vh}
.sidebar{width:210px;flex-shrink:0;border-right:1px solid #e5e4e0;background:#f0efe9;display:flex;flex-direction:column;position:fixed;height:100vh;left:0;top:0}
.sidebar-top{padding:16px;border-bottom:1px solid #e5e4e0}
.logo{font-size:14px;font-weight:600;color:#1a1a1a}
.logo-sub{font-size:11px;color:#888;margin-top:3px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:13px;color:#666;transition:background 0.1s}
.nav-item.active,.nav-item:hover{background:#fff;color:#1a1a1a}
.nav-badge{margin-left:auto;background:#E24B4A;color:white;border-radius:20px;font-size:10px;padding:1px 6px}
.sidebar-bottom{margin-top:auto;padding:12px 16px;border-top:1px solid #e5e4e0;font-size:11px;color:#888}
.main{flex:1;margin-left:210px;display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #e5e4e0;background:#fff;position:sticky;top:0;z-index:10;gap:10px;flex-wrap:wrap}
.page-title{font-size:15px;font-weight:600}
.btn{font-size:12px;padding:6px 14px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#1a1a1a;cursor:pointer;transition:background 0.1s}
.btn:hover{background:#f5f4f0}
.btn-green{background:#1D9E75;color:white;border-color:#1D9E75}
.btn-green:hover{background:#0F6E56}
.btn-red{background:#E24B4A;color:white;border-color:#E24B4A}
.content{flex:1;padding:20px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:800px){.grid4{grid-template-columns:repeat(2,1fr)}}
.stat{background:#fff;border-radius:10px;padding:12px 16px;border:1px solid #e5e4e0}
.stat-l{font-size:11px;color:#888;margin-bottom:4px}
.stat-v{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.stat-s{font-size:11px;color:#aaa}
.section-h{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
.card{background:#fff;border-radius:10px;border:1px solid #e5e4e0;overflow:hidden}
.res-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #f5f4f0;gap:8px;flex-wrap:wrap}
.res-row:last-child{border-bottom:none}
.res-guest{font-size:13px;font-weight:600}
.res-meta{font-size:11px;color:#888;margin-top:2px}
.res-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.b-airbnb{background:#FFE8EC;color:#C8523E}
.b-booking{background:#E6EFF8;color:#2E5F9E}
.b-direct{background:#E0F5F3;color:#3D8B78}
.b-ok{background:#E1F5EE;color:#0F6E56}
.tabs{display:flex;gap:2px;padding:8px 12px;border-bottom:1px solid #e5e4e0;overflow-x:auto}
.tab{font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;color:#666;white-space:nowrap}
.tab.active{background:#f0efe9;color:#1a1a1a;font-weight:600}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:20px;max-width:480px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:10px;border-top:1px solid #f0efe9}
.conflict-banner{background:#FEF3C7;border:1px solid #F59E0B;border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
input,textarea,select{font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:7px;width:100%;outline:none;font-family:inherit}
input:focus,textarea:focus,select:focus{border-color:#1D9E75}
.form-row{margin-bottom:10px}
.form-label{font-size:11px;color:#888;margin-bottom:4px}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid #ddd;border-top-color:#1D9E75;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;z-index:200;pointer-events:none}
.toast.show{opacity:1}
.rate-card{background:#fff;border:1px solid #e5e4e0;border-radius:10px;padding:14px;margin-bottom:12px}
.msg-row{padding:10px 14px;border-bottom:1px solid #f5f4f0;cursor:pointer}
.msg-row:hover{background:#f9f9f9}
.msg-row.unread{background:#f0f9ff}



</style>
</head>

async function api(path,method='GET',body=null,timeoutMs=6000){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),timeoutMs);
  try{
    const opts={method,headers:{'Content-Type':'application/json'},signal:ctrl.signal};
    if(body)opts.body=JSON.stringify(body);
    const r=await fetch(PROXY+'/api'+path,opts);
    clearTimeout(timer);
    return r.json();
  }catch(e){clearTimeout(timer);throw e;}
}

function fmt(s){if(!s)return '';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});}
function dStr(d){return d.toISOString().slice(0,10);}
function parseD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function nights(a,b){return Math.round((parseD(b)-parseD(a))/86400000);}
function platClass(p){if(!p)return 'direct';const l=p.toLowerCase();if(l.includes('airbnb'))return 'airbnb';if(l.includes('booking'))return 'booking';return 'direct';}
function platLabel(p){if(!p)return 'Direct';const l=p.toLowerCase();if(l.includes('airbnb'))return 'Airbnb';if(l.includes('booking'))return 'Booking.com';return p;}

function mapRes(r){return{id:String(r.reservation_code||r.id||r.code),guest:r.guest_name||'Voyageur',platform:r.channel_type||r.channel||'direct',check_in:r.check_in_date||r.check_in||r.arrival,check_out:r.check_out_date||r.check_out||r.departure,amount:parseFloat(r.rates?.total_rate?.amount||r.total_price||0),currency:r.rates?.total_rate?.currency||r.currency||'EUR',commission:parseFloat(r.rates?.total_commission?.amount||0),status:r.status||'confirmed',stay_status:r.stay_status||'',guests:r.number_of_guests||1,phone:r.guest_phone||'',email:r.guest_email||'',prop_id:String(r.property_id||''),booked_at:r.booked_at||''};}

function loadFromCSV(){
  const map={};
  for(const r of CSV_DATA){
    const key=r.reservation_code||r.id;
    map[key]=mapRes(r);
  }
  return Object.values(map).sort((a,b)=>(b.check_in||'').localeCompare(a.check_in||''));
}

async function syncLive(){
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),8000);
    const rd=await fetch(PROXY+'/all-reservations',{signal:controller.signal});
    clearTimeout(timeout);
    const data=await rd.json();
    const liveRes=data.data?.reservations||[];
    if(!liveRes.length)return;
    const map={};
    for(const r of S.reservations)map[r.id]=r;
    for(const r of liveRes){const key=r.reservation_code||r.id;map[key]=mapRes(r);}
    S.reservations=Object.values(map).sort((a,b)=>(b.check_in||'').localeCompare(a.check_in||''));
    document.getElementById('conn-label').innerHTML='&#10003; '+S.reservations.length+' r\u00e9servations';
    document.getElementById('live-badge').innerHTML='<span class="badge b-ok">Live</span>';
    if(S.page==='dashboard'||S.page==='calendar')render();
  }catch(e){
    document.getElementById('live-badge').innerHTML='<span class="badge" style="background:#f5f4f0;color:#888">CSV</span>';
  }
}

function checkConflicts(){
  const c=[];
  for(const prop of S.props){
    const res=S.reservations.filter(r=>r.prop_id===prop.id&&r.check_in&&r.check_out);
    for(let i=0;i<res.length;i++)for(let j=i+1;j<res.length;j++)
      if(parseD(res[i].check_in)<parseD(res[j].check_out)&&parseD(res[i].check_out)>parseD(res[j].check_in))c.push({a:res[i],b:res[j]});
  }
  return c;
}

function renderDash(){
  const now=new Date();
  const past=S.reservations.filter(r=>r.check_in&&r.check_out&&r.status!=='cancelled');
  const monthRes=past.filter(r=>{const d=parseD(r.check_in);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const rev=monthRes.reduce((s,r)=>s+r.amount,0);
  const totalRev=past.reduce((s,r)=>s+r.amount,0);
  const upcoming=S.reservations.filter(r=>r.check_in&&parseD(r.check_in)>=now).sort((a,b)=>a.check_in.localeCompare(b.check_in)).slice(0,5);
  const unread=S.conversations.filter(c=>c.unread).length;
  const conflicts=checkConflicts();

  // Calcul revenus 12 derniers mois
  const months12=[];
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const label=MONTHS[d.getMonth()].slice(0,3)+' '+String(d.getFullYear()).slice(2);
    const res=past.filter(r=>{if(!r.check_in)return false;const rd=parseD(r.check_in);return rd.getMonth()===d.getMonth()&&rd.getFullYear()===d.getFullYear();});
    const rv=res.reduce((s,r)=>s+r.amount,0);
    const airbnbRv=res.filter(r=>platClass(r.platform)==='airbnb').reduce((s,r)=>s+r.amount,0);
    const bookingRv=res.filter(r=>platClass(r.platform)==='booking').reduce((s,r)=>s+r.amount,0);
    const directRv=res.filter(r=>platClass(r.platform)==='direct').reduce((s,r)=>s+r.amount,0);
    months12.push({label,rv,airbnbRv,bookingRv,directRv,count:res.length});
  }

  // Taux occupation par bien (30 derniers jours)
  const occ30=S.props.map(p=>{
    const days30=30;
    let occupied=0;
    const today=new Date();
    for(let d=0;d<days30;d++){
      const dd=new Date(today.getFullYear(),today.getMonth(),today.getDate()-d);
      const dds=dStr(dd);
      const isOcc=past.some(r=>r.prop_id===p.id&&r.check_in&&r.check_out&&parseD(r.check_in)<=dd&&parseD(r.check_out)>dd);
      if(isOcc)occupied++;
    }
    return{name:p.name,pct:Math.round(occupied/days30*100)};
  });

  // Répartition plateformes
  const platData=['airbnb','booking','direct'].map(pl=>{
    const lst=past.filter(r=>platClass(r.platform)===pl);
    return{pl,count:lst.length,rev:lst.reduce((s,r)=>s+r.amount,0)};
  }).filter(d=>d.count>0);
  const totalCount=platData.reduce((s,d)=>s+d.count,0);

  document.getElementById('main-content').innerHTML=`
    ${conflicts.length?`<div class="conflict-banner"><span style="font-size:13px;font-weight:500;color:#854F0B">⚠ ${conflicts.length} conflit(s) détecté(s)</span><button class="btn btn-red" style="font-size:11px" onclick="navigate('reservations')">Voir</button></div>`:''}
    <div class="grid4">
      <div class="stat"><div class="stat-l">Revenus ce mois</div><div class="stat-v">${Math.round(rev).toLocaleString('fr-FR')} €</div><div class="stat-s">${MONTHS[now.getMonth()]}</div></div>
      <div class="stat"><div class="stat-l">Revenus total</div><div class="stat-v">${Math.round(totalRev).toLocaleString('fr-FR')} €</div><div class="stat-s">${past.length} réservations</div></div>
      <div class="stat"><div class="stat-l">Messages non lus</div><div class="stat-v" style="color:${unread?'#E24B4A':'#1D9E75'}">${unread}</div><div class="stat-s">${unread?'À répondre':'Tout lu'}</div></div>
      <div class="stat"><div class="stat-l">Arrivées à venir</div><div class="stat-v">${upcoming.length}</div><div class="stat-s">Prochaines</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div class="card" style="padding:14px">
        <div style="font-size:12px;font-weight:600;margin-bottom:12px">Revenus par mois (12 mois)</div>
        <canvas id="chart-rev" height="160"></canvas>
      </div>
      <div class="card" style="padding:14px">
        <div style="font-size:12px;font-weight:600;margin-bottom:12px">Répartition plateformes</div>
        <canvas id="chart-plat" height="160"></canvas>
      </div>
    </div>

    <div class="card" style="padding:14px;margin-bottom:14px">
      <div style="font-size:12px;font-weight:600;margin-bottom:12px">Taux d'occupation — 30 derniers jours</div>
      ${occ30.map(o=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div style="font-size:12px;color:#666;min-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${o.name}</div>
          <div style="flex:1;background:#f0efe9;border-radius:20px;height:10px;overflow:hidden">
            <div style="width:${o.pct}%;background:${o.pct>70?'#1D9E75':o.pct>40?'#EF9F27':'#E24B4A'};height:100%;border-radius:20px;transition:width 0.5s"></div>
          </div>
          <div style="font-size:12px;font-weight:600;min-width:36px;text-align:right">${o.pct}%</div>
        </div>`).join('')}
    </div>

    <div class="section-h">Prochaines arrivées</div>
    <div class="card">${upcoming.length?upcoming.map(r=>{const prop=S.props.find(p=>p.id===r.prop_id);return`<div class="res-row"><div><div class="res-guest">${r.guest}</div><div class="res-meta">${prop?prop.name:'—'} • ${fmt(r.check_in)} → ${fmt(r.check_out)}</div></div><div class="res-right"><span class="badge b-${platClass(r.platform)}">${platLabel(r.platform)}</span><span style="font-size:13px;font-weight:600">${Math.round(r.amount).toLocaleString('fr-FR')} €</span></div></div>`;}).join(''):'<div style="color:#888;font-size:13px">Aucune réservation à venir.</div>'}</div>
  `;

  // Graphique revenus barres empilées
  setTimeout(function(){
    const c1=document.getElementById('chart-rev');
    if(!c1)return;
    const ctx1=c1.getContext('2d');
    const W=c1.offsetWidth;const H=160;c1.width=W;c1.height=H;
    const pad={l:40,r:10,t:10,b:28};
    const bw=Math.floor((W-pad.l-pad.r)/months12.length)-3;
    const maxRv=Math.max(...months12.map(m=>m.rv),1);
    ctx1.clearRect(0,0,W,H);
    months12.forEach(function(m,i){
      const x=pad.l+i*(bw+3);
      const chartH=H-pad.t-pad.b;
      const airH=Math.round(m.airbnbRv/maxRv*chartH);
      const bookH=Math.round(m.bookingRv/maxRv*chartH);
      const dirH=Math.round(m.directRv/maxRv*chartH);
      let y=H-pad.b;
      if(airH>0){ctx1.fillStyle='#FFB3B3';ctx1.fillRect(x,y-airH,bw,airH);y-=airH;}
      if(bookH>0){ctx1.fillStyle='#85B7EB';ctx1.fillRect(x,y-bookH,bw,bookH);y-=bookH;}
      if(dirH>0){ctx1.fillStyle='#5DCAA5';ctx1.fillRect(x,y-dirH,bw,dirH);}
      ctx1.fillStyle='#aaa';ctx1.font='9px sans-serif';ctx1.textAlign='center';
      ctx1.fillText(m.label,x+bw/2,H-pad.b+11);
      if(m.rv>0){ctx1.fillStyle='#444';ctx1.font='8px sans-serif';ctx1.fillText(Math.round(m.rv/1000*10)/10+'k',x+bw/2,H-pad.b-Math.round(m.rv/maxRv*(H-pad.t-pad.b))-3);}
    });
    // Légende
    const leg=[['#FFB3B3','Airbnb'],['#85B7EB','Booking'],['#5DCAA5','Direct']];
    leg.forEach(function(l,i){
      ctx1.fillStyle=l[0];ctx1.fillRect(pad.l+i*70,4,10,8);
      ctx1.fillStyle='#666';ctx1.font='9px sans-serif';ctx1.textAlign='left';
      ctx1.fillText(l[1],pad.l+i*70+13,11);
    });

    // Graphique camembert plateformes
    const c2=document.getElementById('chart-plat');
    if(!c2)return;
    const ctx2=c2.getContext('2d');
    const W2=c2.offsetWidth;c2.width=W2;c2.height=160;
    const cx=W2/2-40,cy=75,radius=60;
    const colors={'airbnb':'#FFB3B3','booking':'#85B7EB','direct':'#5DCAA5'};
    let startAngle=-Math.PI/2;
    platData.forEach(function(d){
      const slice=d.count/totalCount*2*Math.PI;
      ctx2.beginPath();ctx2.moveTo(cx,cy);
      ctx2.arc(cx,cy,radius,startAngle,startAngle+slice);
      ctx2.closePath();ctx2.fillStyle=colors[d.pl]||'#ccc';ctx2.fill();
      ctx2.strokeStyle='#fff';ctx2.lineWidth=2;ctx2.stroke();
      startAngle+=slice;
    });
    // Légende camembert
    let ly=30;
    platData.forEach(function(d){
      ctx2.fillStyle=colors[d.pl]||'#ccc';ctx2.fillRect(W2-80,ly,12,12);
      ctx2.fillStyle='#333';ctx2.font='11px sans-serif';ctx2.textAlign='left';
      ctx2.fillText(platLabel(d.pl),W2-64,ly+10);
      ctx2.fillStyle='#888';ctx2.font='10px sans-serif';
      ctx2.fillText(Math.round(d.rev).toLocaleString('fr-FR')+'€',W2-64,ly+22);
      ctx2.fillText(d.count+' rés. ('+Math.round(d.count/totalCount*100)+'%)',W2-64,ly+34);
      ly+=50;
    });
  },50);
}

  document.getElementById('main-content').innerHTML=`
    <div class="tabs">${['Toutes','Airbnb','Booking','Direct'].map(t=>`<div class="tab ${filter===t?'active':''}" onclick="S.resFilter='${t}';render()">${t}</div>`).join('')}</div>
    <div class="card">${filtered.length?filtered.map(r=>{const prop=S.props.find(p=>p.id===r.prop_id);const n=r.check_in&&r.check_out?nights(r.check_in,r.check_out):'?';return`<div class="res-row"><div><div class="res-guest">${r.guest}</div><div class="res-meta">${prop?prop.name:'—'} • ${fmt(r.check_in)} → ${fmt(r.check_out)} • ${n} nuits</div></div><div class="res-right"><span class="badge b-${platClass(r.platform)}">${platLabel(r.platform)}</span><span style="font-size:13px;font-weight:600">${Math.round(r.amount).toLocaleString('fr-FR')} €</span><button class="btn" style="font-size:11px" onclick="openResDetail('${r.id}')">Détail</button></div></div>`;}).join(''):'<div style="color:#888;font-size:13px">Aucune réservation.</div>'}</div>`;
}

function renderCal(){
  const year=S.currentMonth.getFullYear(), month=S.currentMonth.getMonth();
  const dim=new Date(year,month+1,0).getDate();
  const firstDay=new Date(year,month,1).getDay();
  const dPrev=new Date(year,month,0).getDate();
  const total=Math.ceil((firstDay+dim)/7)*7;
  const JOURS=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
  const MOIS=["Janvier","F\u00e9vrier","Mars","Avril","Mai","Juin","Juillet","Ao\u00fbt","Septembre","Octobre","Novembre","D\u00e9cembre"];
  const view=S.calView||"single";

  const CP={"airbnb":"#C8523E","booking.com":"#2E5F9E","booking":"#2E5F9E","direct":"#3D8B78"};
  const CPN={"airbnb":"Airbnb","booking.com":"Booking","booking":"Booking","direct":"Direct"};
  const CBG=["#6B5B9E","#3D8B6A"];
  const RAD="7px";

  // Comparaison de dates UNIQUEMENT sur la string YYYY-MM-DD (pas d'objet Date)
  // Evite tous les bugs de comparaison d'objets Date en JS
  function ds2n(s){return parseInt(s.replace(/-/g,""),10);}  // "2026-04-17" -> 20260417

  // Attribue un index de ligne FIXE a chaque reservation pour tout l'historique
  // Toutes les resa du bien, triees par check_in
  // rowEnd[i] = numero de date de fin de la ligne i (string YYYY-MM-DD)
  function computeRows(propId){
    const res=S.reservations
      .filter(function(r){return r.prop_id===propId&&r.check_in&&r.check_out&&r.status!=="cancelled";})
      .slice()
      .sort(function(a,b){return a.check_in<b.check_in?-1:a.check_in>b.check_in?1:0;});
    const rowEnd=[]; // stocke la date check_out (string) de chaque ligne
    const rowOf={};
    res.forEach(function(r){
      const ciN=ds2n(r.check_in);
      var row=-1;
      for(var i=0;i<rowEnd.length;i++){
        // La ligne est libre si le check_in de r est >= check_out de ce qui occupe la ligne
        if(ciN>=ds2n(rowEnd[i])){row=i;break;}
      }
      if(row===-1){row=rowEnd.length;rowEnd.push("");}
      rowEnd[row]=r.check_out;
      rowOf[r.id]=row;
    });
    return {rowOf:rowOf, nRows:Math.max(1,rowEnd.length)};
  }

  // Genere les divs de barres pour une cellule (ds=date string)
  function cellBars(ds, propRes, rowOf, topOff, barH, colorFn){
    const dsN=ds2n(ds);
    var out="";
    propRes.forEach(function(r){
      const ciN=ds2n(r.check_in), coN=ds2n(r.check_out);
      // Actif si check_in<=date ET check_out>=date (check_out inclus = jour depart)
      if(ciN>dsN||coN<dsN)return;
      const row=rowOf[r.id]||0;
      const col=colorFn(r);
      const arr=r.check_in===ds, dep=r.check_out===ds;
      const top=topOff+row*(barH+2);
      const name=(r.guest||"").split(" ")[0];

      // ARRONDI : arrivee=gauche arrondi+droite carree, depart=gauche carre+droite arrondie
      var L,R,TL,BL,TR,BR;
      if(arr&&dep){L="3px";R="3px";TL=RAD;BL=RAD;TR=RAD;BR=RAD;}
      else if(arr){L="50%";R="0";  TL=RAD;BL=RAD;TR="0"; BR="0"; }
      else if(dep){L="0";  R="50%";TL="0"; BL="0"; TR=RAD;BR=RAD;}
      else        {L="0";  R="0";  TL="0"; BL="0"; TR="0"; BR="0";}

      // Nom affiché UNE SEULE FOIS : case arrivée ou 1er jour visible du mois
      const isFirstVisible=(!arr&&ds===dStr(new Date(year,month,1)));
      const label=(arr||isFirstVisible)&&name?('<span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:8px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;pointer-events:none;max-width:90%">'+name+'</span>'):"";

      out+="<div onclick=\"event.stopPropagation();openResDetail('"+r.id+"')\" title=\""+(r.guest||"")+" - "+platLabel(r.platform)+" - "+fmt(r.check_in)+" -> "+fmt(r.check_out)+"\" style=\"position:absolute;left:"+L+";right:"+R+";top:"+top+"px;height:"+barH+"px;background:"+col+";border-top-left-radius:"+TL+";border-bottom-left-radius:"+BL+";border-top-right-radius:"+TR+";border-bottom-right-radius:"+BR+";cursor:pointer;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,0.18);\" onmouseover=\"this.style.opacity=.75\" onmouseout=\"this.style.opacity=1\">"+label+"</div>";
    });
    return out;
  }

  const TH="font-size:10px;color:#888;text-align:center;padding:6px 2px;font-weight:600;background:#f5f4f0;border:1px solid #e5e4e0;";
  const thead="<tr>"+JOURS.map(function(d){return"<th style=\""+TH+"\">"+d+"</th>";}).join("")+"</tr>";

  function mStats(propId){
    var r=S.reservations.filter(function(r){return r.prop_id===propId&&r.check_in&&r.status!=="cancelled"&&(function(){var d=parseD(r.check_in);return d.getMonth()===month&&d.getFullYear()===year;})();});
    return {n:r.length,rev:r.reduce(function(s,x){return s+x.amount;},0)};
  }

  const legItems=["airbnb","booking.com","direct"].map(function(k){
    return "<span style=\"display:inline-flex;align-items:center;gap:4px;font-size:10px\"><span style=\"width:18px;height:10px;border-radius:5px;background:"+CP[k]+";display:inline-block\"></span><b style=\"color:#555\">"+CPN[k]+"</b></span>";
  }).join("");

  const nav="<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px\">"
    +"<div style=\"display:flex;align-items:center;gap:8px\">"
    +"<button class=\"btn\" onclick=\"chgMonth(-1)\" style=\"font-size:16px;padding:4px 14px\">\u2039</button>"
    +"<span style=\"font-size:15px;font-weight:700;min-width:160px;text-align:center\">"+MOIS[month]+" "+year+"</span>"
    +"<button class=\"btn\" onclick=\"chgMonth(1)\" style=\"font-size:16px;padding:4px 14px\">\u203a</button>"
    +"<button class=\"btn\" style=\"font-size:11px\" onclick=\"S.currentMonth=new Date();render()\">Auj.</button>"
    +"</div>"
    +"<div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">"
    +(view==="single"?legItems:"")
    +"<div style=\"display:flex;gap:4px\">"
    +"<button class=\"btn"+(view==="single"?" btn-green":"")+"\" style=\"font-size:11px\" onclick=\"S.calView='single';render()\">Par bien</button>"
    +"<button class=\"btn"+(view==="global"?" btn-green":"")+"\" style=\"font-size:11px\" onclick=\"S.calView='global';render()\">Vue globale</button>"
    +"</div></div></div>";

  // ── VUE PAR BIEN ─────────────────────────────────────────────────────
  if(view==="single"){
    const BAR=18, LABEL=20;
    const propRes=S.reservations.filter(function(r){return r.prop_id===S.selectedProp&&r.check_in&&r.check_out&&r.status!=="cancelled";});
    const info=computeRows(S.selectedProp);
    const cellH=Math.max(62, LABEL+info.nRows*(BAR+2)+6);
    var tds="";
    for(var i=0;i<total;i++){
      var day,cur=true;
      if(i<firstDay){day=dPrev-firstDay+i+1;cur=false;}
      else if(i>=firstDay+dim){day=i-firstDay-dim+1;cur=false;}
      else day=i-firstDay+1;
      const date=cur?new Date(year,month,day):i<firstDay?new Date(year,month-1,day):new Date(year,month+1,day);
      const ds=dStr(date);
      const isToday=ds===dStr(new Date());
      const isWE=date.getDay()===0||date.getDay()===6;
      const bg=isToday?"#FFFBF0":isWE&&cur?"#FAFAFA":"#fff";
      const bd=isToday?"2px solid #F59E0B":"1px solid #e5e4e0";
      const bars=cellBars(ds,propRes,info.rowOf,LABEL,BAR,function(r){return CP[r.platform]||CP["direct"];});
      tds+="<td onclick=\"_dc('"+ds+"','"+S.selectedProp+"')\" style=\"border:"+bd+";height:"+cellH+"px;vertical-align:top;padding:4px 2px 2px;cursor:pointer;background:"+bg+";opacity:"+(cur?1:0.3)+";position:relative;\" onmouseover=\"if("+(cur?1:0)+")this.style.background='"+(isToday?"#FFF3D0":"#F5F4F0")+"'\" onmouseout=\"this.style.background='"+bg+"'\">"
        +"<div style=\"font-size:10px;font-weight:"+(isToday?700:400)+";color:"+(isToday?"#92400E":"#ccc")+"\">"+day+(propRes.some(r=>r.check_out===ds)?" 🧹":"")+"</div>"
        +bars+"</td>";
      if((i+1)%7===0&&i<total-1)tds+="</tr><tr>";
    }
    const st=mStats(S.selectedProp);
    const prop=S.props.find(function(p){return p.id===S.selectedProp;})||{name:""};
    document.getElementById("main-content").innerHTML=nav
      +"<div style=\"display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap\">"
      +S.props.map(function(p){return"<button class=\"btn"+(S.selectedProp===p.id?" btn-green":"")+"\" style=\"font-size:11px\" onclick=\"S.selectedProp='"+p.id+"';render()\">"+p.name+"</button>";}).join("")
      +"</div>"
      +"<div style=\"font-size:11px;color:#888;margin-bottom:10px\">"+prop.name+" \u2014 "+st.n+"\u00a0r\u00e9s. \u00b7 "+Math.round(st.rev).toLocaleString("fr-FR")+"\u00a0\u20ac</div>"
      +"<div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;min-width:560px\">"+thead+"<tr>"+tds+"</tr></table></div>";

  // ── VUE GLOBALE ──────────────────────────────────────────────────────
  } else {
    const BAR=17, LABEL=18, SEP=10;
    const info0=S.props[0]?computeRows(S.props[0].id):{rowOf:{},nRows:1};
    const info1=S.props[1]?computeRows(S.props[1].id):{rowOf:{},nRows:1};
    const res0=S.props[0]?S.reservations.filter(function(r){return r.prop_id===S.props[0].id&&r.check_in&&r.check_out&&r.status!=="cancelled";}):[];
    const res1=S.props[1]?S.reservations.filter(function(r){return r.prop_id===S.props[1].id&&r.check_in&&r.check_out&&r.status!=="cancelled";}):[];
    const OFF0=LABEL;
    const OFF1=OFF0+info0.nRows*(BAR+2)+SEP;
    const CELL_H=OFF1+info1.nRows*(BAR+2)+8;

    var tds="";
    for(var i=0;i<total;i++){
      var day,cur=true;
      if(i<firstDay){day=dPrev-firstDay+i+1;cur=false;}
      else if(i>=firstDay+dim){day=i-firstDay-dim+1;cur=false;}
      else day=i-firstDay+1;
      const date=cur?new Date(year,month,day):i<firstDay?new Date(year,month-1,day):new Date(year,month+1,day);
      const ds=dStr(date);
      const isToday=ds===dStr(new Date());
      const isWE=date.getDay()===0||date.getDay()===6;
      const bg=isToday?"#FFFBF0":isWE&&cur?"#FAFAFA":"#fff";
      const bd=isToday?"2px solid #F59E0B":"1px solid #e5e4e0";
      const sep="<div style=\"position:absolute;left:4px;right:4px;top:"+(OFF1-SEP/2)+"px;height:1px;background:#e0ddd8;pointer-events:none\"></div>";
      const b0=cellBars(ds,res0,info0.rowOf,OFF0,BAR,function(){return CBG[0];});
      const b1=cellBars(ds,res1,info1.rowOf,OFF1,BAR,function(){return CBG[1];});
      tds+="<td onclick=\"_dg('"+ds+"')\" style=\"border:"+bd+";height:"+CELL_H+"px;vertical-align:top;padding:4px 2px 2px;cursor:pointer;background:"+bg+";opacity:"+(cur?1:0.3)+";position:relative;\" onmouseover=\"if("+(cur?1:0)+")this.style.background='"+(isToday?"#FFF3D0":"#F5F4F0")+"'\" onmouseout=\"this.style.background='"+bg+"'\">"
        +"<div style=\"font-size:10px;font-weight:"+(isToday?700:400)+";color:"+(isToday?"#92400E":"#ccc")+"\">"+day+"</div>"
        +sep+b0+b1+"</td>";
      if((i+1)%7===0&&i<total-1)tds+="</tr><tr>";
    }
    const propLeg=S.props.map(function(p,i){
      const st=mStats(p.id);
      return"<span style=\"display:inline-flex;align-items:center;gap:5px;font-size:11px\"><span style=\"width:14px;height:14px;border-radius:4px;background:"+CBG[i]+";display:inline-block;flex-shrink:0\"></span><b>"+p.name+"</b> \u2014 "+st.n+"\u00a0r\u00e9s. \u00b7 "+Math.round(st.rev).toLocaleString("fr-FR")+"\u00a0\u20ac</span>";
    }).join("<span style=\"color:#ddd;margin:0 8px\">|</span>");

    document.getElementById("main-content").innerHTML=nav
      +"<div style=\"padding:10px 14px;background:#f9f9f9;border:1px solid #e5e4e0;border-radius:8px;margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap;align-items:center\">"+propLeg+"</div>"
      +"<div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;min-width:600px\">"+thead+"<tr>"+tds+"</tr></table></div>";
  }
}
function chgMonth(d){S.currentMonth=new Date(S.currentMonth.getFullYear(),S.currentMonth.getMonth()+d,1);render();}

function _dc(ds,propId){
  const date=new Date(ds+"T00:00:00");
  const res=S.reservations.filter(function(r){return r.prop_id===propId&&r.check_in&&r.check_out&&r.status!=="cancelled"&&parseD(r.check_in)<=date&&parseD(r.check_out)>=date;});
  if(res.length)_calModal(ds,res);
}
function _dg(ds){
  const date=new Date(ds+"T00:00:00");
  const res=S.reservations.filter(function(r){return r.check_in&&r.check_out&&r.status!=="cancelled"&&parseD(r.check_in)<=date&&parseD(r.check_out)>=date;});
  if(res.length)_calModal(ds,res);
}
function _calModal(ds,res){
  const date=new Date(ds+"T00:00:00");
  const BG={"airbnb":"#C8523E","booking.com":"#2E5F9E","booking":"#2E5F9E","direct":"#3D8B78"};
  showModal("<h3>"+date.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})+"</h3>"
    +res.map(function(r){
      const bg=BG[r.platform]||"#3D8B78";
      const arr=dStr(parseD(r.check_in))===ds, dep=dStr(parseD(r.check_out))===ds;
      const prop=S.props.find(function(p){return p.id===r.prop_id;});
      return"<div style=\"border-left:4px solid "+bg+";background:#f9f9f9;border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:8px\">"
        +"<div style=\"font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap\">"+(r.guest||"")
        +(arr?" <span style=\"font-size:10px;background:#E1F5EE;color:#0F6E56;padding:1px 7px;border-radius:10px\">Arriv\u00e9e</span>":"")
        +(dep?" <span style=\"font-size:10px;background:#FCEBEB;color:#A32D2D;padding:1px 7px;border-radius:10px\">D\u00e9part</span>":"")
        +"</div>"
        +"<div style=\"font-size:11px;color:#888;margin-top:3px\">"+(prop?prop.name:"")+" \u00b7 "+platLabel(r.platform)+" \u00b7 "+fmt(r.check_in)+"\u2192"+fmt(r.check_out)+" \u00b7 "+r.amount.toLocaleString("fr-FR")+"\u00a0\u20ac</div>"
        +"<button class=\"btn\" style=\"font-size:10px;margin-top:6px;padding:3px 8px\" onclick=\"closeModal();openResDetail('"+r.id+"')\">D\u00e9tail</button>"
        +"</div>";
    }).join("")
    +"<div class=\"modal-actions\"><button class=\"btn\" onclick=\"closeModal()\">Fermer</button></div>");
}
function renderRates(){
  // Si les props ne sont pas encore chargées, réessayer dans 300ms
  if(!S.props||!S.props.length){
    document.getElementById('main-content').innerHTML='<div style="color:#888;padding:30px;text-align:center"><div class="spinner"></div> Chargement des biens...</div>';
    setTimeout(renderRates, 300);
    return;
  }
  if(!S.ratesProp) S.ratesProp=S.props[0].id;
  const prop=S.props.find(p=>p.id===S.ratesProp)||S.props[0];
  if(!prop){document.getElementById('main-content').innerHTML='<div style="color:#888;padding:20px">Aucun bien disponible.</div>';return;}
  const m=S.ratesMonth||new Date();
  const year=m.getFullYear(), month=m.getMonth();
  const dim=new Date(year,month+1,0).getDate();
  const firstDay=new Date(year,month,1).getDay();
  const MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const JOURS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const total=Math.ceil((firstDay+dim)/7)*7;

  // Récupérer les tarifs stockés localement (S.ratesPrices)
  if(!S.ratesPrices) S.ratesPrices={};
  if(!S.ratesMinStay) S.ratesMinStay={};

  // Construire grille
  let cells='';
  for(let i=0;i<total;i++){
    let day,cur=true;
    const dPrev=new Date(year,month,0).getDate();
    if(i<firstDay){day=dPrev-firstDay+i+1;cur=false;}
    else if(i>=firstDay+dim){day=i-firstDay-dim+1;cur=false;}
    else day=i-firstDay+1;
    const date=cur?new Date(year,month,day):i<firstDay?new Date(year,month-1,day):new Date(year,month+1,day);
    const ds=dStr(date);
    const isToday=ds===dStr(new Date());
    const isPast=date<new Date(new Date().toDateString());
    const isWE=date.getDay()===0||date.getDay()===6;

    // Tarif stocké pour ce jour / ce bien
    const key=prop.id+'_'+ds;
    const airPrice=S.ratesPrices[key+'_air']||null;
    const bkPrice=S.ratesPrices[key+'_bk']||null;
    const minStay=S.ratesMinStay[key]||null;

    // Réservation ce jour ?
    const isBooked=S.reservations.some(r=>r.prop_id===prop.id&&r.check_in&&r.check_out&&r.status!=='cancelled'&&parseD(r.check_in)<=date&&parseD(r.check_out)>date);
    const isCheckout=S.reservations.some(r=>r.prop_id===prop.id&&r.check_out&&dStr(parseD(r.check_out))===ds&&r.status!=='cancelled');

    const bgCell=!cur?'#fafafa':isPast?'#f9f9f9':isBooked?'#FFF0ED':isWE?'#F8F9FF':'#fff';
    const borderCell=isToday?'2px solid #F59E0B':'1px solid #e5e4e0';
    const opacity=cur?1:0.3;

    let priceContent='';
    if(cur){
      if(isPast){
        // Passé : afficher seulement si prix connu
        priceContent=airPrice||bkPrice
          ?`<div style="font-size:9px;color:#ccc;margin-top:2px">${airPrice?'🏠'+airPrice+'€':''}${bkPrice?' 🏨'+bkPrice+'€':''}</div>`
          :`<div style="font-size:9px;color:#ddd;margin-top:2px">—</div>`;
      } else if(isBooked){
        // Réservé : afficher prix + badge
        priceContent=`<div style="font-size:9px;color:#C8523E;font-weight:600;margin-top:1px">Réservé</div>`;
        if(airPrice||bkPrice) priceContent+=`<div style="font-size:8px;color:#aaa">${airPrice?airPrice+'€ ':''}${bkPrice?bkPrice+'€':''}</div>`;
      } else {
        // Disponible : afficher prix par plateforme avec possibilité d'édition
        priceContent=`<div style="margin-top:2px">`;
        // Airbnb
        priceContent+=`<div style="display:flex;align-items:center;gap:2px;margin-bottom:1px">
          <span style="font-size:7px;background:#FFE8EC;color:#C8523E;padding:0 3px;border-radius:3px;font-weight:700">A</span>
          <span style="font-size:9px;font-weight:600;color:${airPrice?'#1a1a1a':'#bbb'}">${airPrice?airPrice+'€':'?'}</span>
        </div>`;
        // Booking
        priceContent+=`<div style="display:flex;align-items:center;gap:2px">
          <span style="font-size:7px;background:#E6EFF8;color:#2E5F9E;padding:0 3px;border-radius:3px;font-weight:700">B</span>
          <span style="font-size:9px;font-weight:600;color:${bkPrice?'#1a1a1a':'#bbb'}">${bkPrice?bkPrice+'€':'?'}</span>
        </div>`;
        if(minStay) priceContent+=`<div style="font-size:7px;color:#aaa;margin-top:1px">min ${minStay}n</div>`;
        priceContent+=`</div>`;
      }
    }

    const clickHandler=cur&&!isPast?`onclick="_openRateDay('${ds}','${prop.id}')"`:'' ;
    cells+=`<td ${clickHandler} style="border:${borderCell};height:72px;vertical-align:top;padding:3px 4px 2px;${cur&&!isPast?'cursor:pointer;':''}background:${bgCell};opacity:${opacity};position:relative;" ${cur&&!isPast?`onmouseover="this.style.background='#F0F4FF'" onmouseout="this.style.background='${bgCell}'"`:''}">
      <div style="font-size:10px;font-weight:${isToday?700:400};color:${isToday?'#92400E':'#bbb'};display:flex;justify-content:space-between">
        <span>${day}</span>${isCheckout?'<span title="Ménage" style="font-size:10px">🧹</span>':''}
      </div>
      ${priceContent}
    </td>`;
    if((i+1)%7===0&&i<total-1)cells+='</tr><tr>';
  }

  // Actions groupées
  const TH='font-size:10px;color:#888;text-align:center;padding:6px 2px;font-weight:600;background:#f5f4f0;border:1px solid #e5e4e0;';

  document.getElementById('main-content').innerHTML=
    // Sélection bien + nav mois
    `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${S.props.map(p=>`<button class="btn${S.ratesProp===p.id?' btn-green':''}" style="font-size:11px" onclick="S.ratesProp='${p.id}';renderRates()">${p.name}</button>`).join('')}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn" onclick="chgRatesMonth(-1)" style="font-size:15px;padding:4px 12px">‹</button>
        <span style="font-size:14px;font-weight:700;min-width:150px;text-align:center">${MOIS[month]} ${year}</span>
        <button class="btn" onclick="chgRatesMonth(1)" style="font-size:15px;padding:4px 12px">›</button>
      </div>
    </div>`

    // Barre d'actions groupées
    +`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;padding:10px 14px;background:#f9f9f9;border:1px solid #e5e4e0;border-radius:8px;align-items:center">
      <span style="font-size:11px;color:#888;font-weight:600">Actions groupées :</span>
      <button class="btn" style="font-size:11px" onclick="_ratesBulk('month')">Tout le mois</button>
      <button class="btn" style="font-size:11px" onclick="_ratesBulk('weekends')">Week-ends seuls</button>
      <button class="btn" style="font-size:11px" onclick="_ratesBulk('weekdays')">Semaine seule</button>
      <button class="btn" style="font-size:11px" onclick="openMinStay('${prop.id}')">Séjour minimum</button>
      <button class="btn" style="font-size:11px" onclick="_loadPricesFromAPI('${prop.id}')">↻ Charger tarifs Hostex</button>
    </div>`

    // Légende
    +`<div style="display:flex;gap:12px;margin-bottom:8px;font-size:10px;color:#888;flex-wrap:wrap">
      <span style="display:inline-flex;align-items:center;gap:4px"><span style="background:#FFE8EC;color:#C8523E;padding:0 4px;border-radius:3px;font-weight:700;font-size:9px">A</span>Airbnb</span>
      <span style="display:inline-flex;align-items:center;gap:4px"><span style="background:#E6EFF8;color:#2E5F9E;padding:0 4px;border-radius:3px;font-weight:700;font-size:9px">B</span>Booking</span>
      <span style="background:#FFF0ED;padding:0 6px;border-radius:3px">Réservé</span>
      <span>Cliquer sur un jour pour modifier le tarif</span>
    </div>`

    // Calendrier
    +`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:580px">
      <tr>${JOURS.map(d=>`<th style="${TH}">${d}</th>`).join('')}</tr>
      <tr>${cells}</tr>
    </table></div>`;

  // Charger les tarifs depuis l'API si pas encore fait pour ce mois
  const monthKey=year+'-'+String(month+1).padStart(2,'0');
  if(!S.ratesLoaded) S.ratesLoaded={};
  if(!S.ratesLoaded[prop.id+'_'+monthKey]){
    _loadPricesFromAPI(prop.id);
    S.ratesLoaded[prop.id+'_'+monthKey]=true;
  }
}

function chgRatesMonth(d){
  const m=S.ratesMonth||new Date();
  S.ratesMonth=new Date(m.getFullYear(),m.getMonth()+d,1);
  S.ratesLoaded={};
  renderRates();
}

async function _loadPricesFromAPI(propId){
  const prop=S.props.find(p=>p.id===propId);
  if(!prop)return;
  const m=S.ratesMonth||new Date();
  const from=dStr(new Date(m.getFullYear(),m.getMonth(),1));
  const to=dStr(new Date(m.getFullYear(),m.getMonth()+1,0));
  showToast('Chargement tarifs...');
  try{
    // Récupérer les tarifs via l'API Hostex
    const data=await api('/listings/prices?listing_id='+prop.channels[0]?.listing_id+'&start_date='+from+'&end_date='+to);
    if(!S.ratesPrices) S.ratesPrices={};
    const prices=data?.data?.prices||data?.data||[];
    prices.forEach(function(p){
      const key=propId+'_'+p.date;
      if(p.price){
        S.ratesPrices[key+'_air']=p.price;
        S.ratesPrices[key+'_bk']=p.price;
      }
    });
    showToast('✓ Tarifs chargés');
    renderRates();
  }catch(e){
    showToast('Tarifs non disponibles — saisie manuelle possible');
  }
}

  const date=new Date(ds+'T00:00:00');
  const key=propId+'_'+ds;
  const airPrice=S.ratesPrices[key+'_air']||'';
  const bkPrice=S.ratesPrices[key+'_bk']||'';
  const minStay=S.ratesMinStay[key]||'';
  const prop=S.props.find(p=>p.id===propId);
  const dateStr=date.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

  showModal(`<h3>Tarifs — ${dateStr}</h3>
    <div style="font-size:12px;color:#888;margin-bottom:14px">${prop?prop.name:''}</div>

    <div style="display:grid;gap:12px">
      <div style="padding:12px;background:#FFF8F7;border:1px solid #FFE8EC;border-radius:8px">

          <span style="background:#FF385C;color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700">Airbnb</span>

      </div>

      <div style="padding:12px;background:#F0F6FF;border:1px solid #E6EFF8;border-radius:8px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
          <span style="background:#003580;color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700">Booking</span>
          <span style="font-size:11px;color:#888">tarif nuit</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="number" id="rate-bk-${ds}" value="${bkPrice}" placeholder="€/nuit" min="0" style="width:100px;font-size:14px;font-weight:600;text-align:center">
          <span style="font-size:12px;color:#888">€ / nuit</span>
        </div>
        <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:4px">
            <span style="font-size:11px;color:#666">Séjour min :</span>
            <input type="number" id="rate-ms-${ds}" value="${minStay}" placeholder="nuits" min="1" max="30" style="width:60px;font-size:12px;text-align:center">
            <span style="font-size:11px;color:#888">nuits</span>
          </div>

          <button class="btn" style="font-size:10px" onclick="_fillSamePrice('${ds}','${propId}',1)">Ce jour</button>
          <button class="btn" style="font-size:10px" onclick="_fillSamePrice('${ds}','${propId}',7)">7 jours</button>
          <button class="btn" style="font-size:10px" onclick="_fillSamePrice('${ds}','${propId}',30)">30 jours</button>
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-green" onclick="_saveRateDay('${ds}','${propId}')">✓ Appliquer sur Airbnb + Booking</button>
    </div>`);
}

async function _saveRateDay(ds, propId){
  const airVal=parseInt(document.getElementById('rate-air-'+ds)?.value||0);
  const bkVal=parseInt(document.getElementById('rate-bk-'+ds)?.value||0);
  const msVal=parseInt(document.getElementById('rate-ms-'+ds)?.value||0);
  if(!S.ratesPrices) S.ratesPrices={};
  if(!S.ratesMinStay) S.ratesMinStay={};
  const key=propId+'_'+ds;
  const prop=S.props.find(p=>p.id===propId);
  closeModal();
  showToast('Envoi à Hostex...');
  let ok=0, errors=0;

  // Envoyer pour chaque listing du bien
  for(const ch of (prop?.channels||[])){
    const price=(ch.channel_type==='airbnb'?airVal:bkVal)||airVal||bkVal;
    if(price>0){
      try{
        await api('/listings/prices','POST',{listing_id:ch.listing_id,prices:[{date:ds,price:price}]});
        ok++;
      }catch(e){errors++;}
    }
  }

  // Si pas de channels connus, envoyer quand même avec listing_id du bien
  if(!prop?.channels?.length && (airVal||bkVal)){
    try{
      await api('/listings/prices','POST',{property_id:propId,prices:[{date:ds,price:airVal||bkVal}]});
      ok++;
    }catch(e){errors++;}
  }

  // Séjour minimum
  if(msVal>0){
    try{await api('/listings/restrictions','POST',{property_id:propId,min_nights:msVal,start_date:ds,end_date:ds});}catch(e){}
    S.ratesMinStay[key]=msVal;
  }

  // Mettre à jour localement
  if(airVal>0) S.ratesPrices[key+'_air']=airVal;
  if(bkVal>0) S.ratesPrices[key+'_bk']=bkVal;

  showToast(errors===0?`✓ Tarif appliqué : ${airVal||bkVal}€`:`✓ Partiellement appliqué (${errors} erreur(s))`);
  renderRates();
}

function _fillSamePrice(ds, propId, days){
  const airVal=document.getElementById('rate-air-'+ds)?.value||'';
  const bkVal=document.getElementById('rate-bk-'+ds)?.value||'';
  const msVal=document.getElementById('rate-ms-'+ds)?.value||'';
  if(!airVal&&!bkVal){showToast('Entre un prix d\'abord.');return;}
  if(!S.ratesPrices) S.ratesPrices={};
  const start=new Date(ds+'T00:00:00');
  for(let d=0;d<days;d++){
    const dd=new Date(start.getFullYear(),start.getMonth(),start.getDate()+d);
    const k=propId+'_'+dStr(dd);
    if(airVal) S.ratesPrices[k+'_air']=parseInt(airVal);
    if(bkVal) S.ratesPrices[k+'_bk']=parseInt(bkVal);
    if(msVal) S.ratesMinStay[k]=parseInt(msVal);
  }
  closeModal();
  // Envoyer tout en une fois à l'API
  _sendBulkPrices(propId, ds, days, parseInt(airVal||bkVal));
}

async function _sendBulkPrices(propId, fromDs, days, price){
  if(!price||price<=0)return;
  const prop=S.props.find(p=>p.id===propId);
  const start=new Date(fromDs+'T00:00:00');
  const prices=[];
  for(let d=0;d<days;d++){
    const dd=new Date(start.getFullYear(),start.getMonth(),start.getDate()+d);
    prices.push({date:dStr(dd),price:price});
  }
  showToast('Envoi de '+days+' tarifs...');
  try{
    for(const ch of (prop?.channels||[])){
      await api('/listings/prices','POST',{listing_id:ch.listing_id,prices:prices});
    }
    showToast('✓ '+days+' jours mis à jour');
  }catch(e){showToast('Erreur : '+e.message);}
  renderRates();
}

function _ratesBulk(mode){
  const prop=S.props.find(p=>p.id===S.ratesProp)||S.props[0];
  if(!prop)return;
  const m=S.ratesMonth||new Date();
  const year=m.getFullYear(),month=m.getMonth();
  const dim=new Date(year,month+1,0).getDate();
  const label={'month':'tout le mois','weekends':'week-ends','weekdays':'jours de semaine'}[mode]||mode;
  showModal(`<h3>Tarif groupé — ${label}</h3>
    <div style="font-size:12px;color:#888;margin-bottom:14px">${prop.name}</div>
    <div style="display:grid;gap:10px">
      <div style="display:flex;gap:8px;align-items:center">
        <span style="background:#FF385C;color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700">Airbnb</span>
        <input type="number" id="bulk-air" placeholder="€/nuit" min="0" style="width:90px;font-size:14px;text-align:center">€/nuit
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="background:#003580;color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700">Booking</span>
        <input type="number" id="bulk-bk" placeholder="€/nuit" min="0" style="width:90px;font-size:14px;text-align:center">€/nuit
      </div>
      <div style="font-size:11px;color:#888">⚠ Sera appliqué sur tous les jours disponibles (non réservés)</div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-green" onclick="_applyBulk('${mode}','${prop.id}',${year},${month},${dim})">Appliquer</button>
    </div>`);
}

async function _applyBulk(mode, propId, year, month, dim){
  const airVal=parseInt(document.getElementById('bulk-air')?.value||0);
  const bkVal=parseInt(document.getElementById('bulk-bk')?.value||0);
  if(!airVal&&!bkVal){showToast('Entre un prix.');return;}
  closeModal();
  if(!S.ratesPrices) S.ratesPrices={};
  const prop=S.props.find(p=>p.id===propId);
  const prices=[];
  for(let d=1;d<=dim;d++){
    const date=new Date(year,month,d);
    if(date<new Date(new Date().toDateString()))continue;
    const isBooked=S.reservations.some(r=>r.prop_id===propId&&r.check_in&&r.check_out&&r.status!=='cancelled'&&parseD(r.check_in)<=date&&parseD(r.check_out)>date);
    if(isBooked)continue;
    const dow=date.getDay();
    const isWE=dow===0||dow===5||dow===6;
    if(mode==='weekends'&&!isWE)continue;
    if(mode==='weekdays'&&isWE)continue;
    const ds=dStr(date);
    const key=propId+'_'+ds;
    const price=airVal||bkVal;
    S.ratesPrices[key+'_air']=airVal||price;
    S.ratesPrices[key+'_bk']=bkVal||price;
    prices.push({date:ds,price:price});
  }
  showToast('Envoi de '+prices.length+' tarifs à Hostex...');
  try{
    for(const ch of (prop?.channels||[])){
      // Envoyer par lot de 30
      for(let i=0;i<prices.length;i+=30){
        await api('/listings/prices','POST',{listing_id:ch.listing_id,prices:prices.slice(i,i+30)});
      }
    }
    showToast('✓ '+prices.length+' tarifs mis à jour sur Airbnb + Booking');
  }catch(e){showToast('✓ Tarifs locaux mis à jour (API: '+e.message+')');}
  renderRates();
}

async function applyRate(propId,listingId,channel){
  const val=parseInt(document.getElementById('rate-'+propId+'-'+listingId)?.value);
  if(isNaN(val)||val<=0){showToast('Entre un prix valide.');return;}
  showToast('Envoi à Hostex...');
  try{await api('/listings/prices','POST',{listing_id:listingId,prices:[{date:dStr(new Date()),price:val}]});showToast('✓ Tarif '+platLabel(channel)+' mis à jour : '+val+' €/nuit');}
  catch(e){showToast('Erreur API : '+e.message);}
}


function openMinStay(propId){showModal(`<h3>Séjour minimum</h3><div class="form-row"><label class="form-label">Nuits minimum</label><input class="form-input" type="number" id="ms-val" value="2" min="1"></div><div class="modal-actions"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-green" onclick="saveMinStay('${propId}')">Appliquer</button></div>`);}
async function saveMinStay(propId){const v=parseInt(document.getElementById('ms-val').value)||1;try{await api('/listings/restrictions','POST',{property_id:propId,min_nights:v});showToast(`✓ Séjour min ${v} nuits appliqué`);}catch(e){showToast('Erreur : '+e.message);}closeModal();}
function openWeekend(){showModal(`<h3>Supplément week-end</h3><div class="form-row"><label class="form-label">Majoration ven-sam (%)</label><input class="form-input" type="number" id="wk-val" value="15" min="0" max="200"></div><div class="modal-actions"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-green" onclick="closeModal();showToast('✓ Supplément week-end enregistré')">Appliquer</button></div>`);}


function renderProps(){var h='<div style="display:grid;gap:14px">';S.props.forEach(function(p){h+='<div class="card" style="padding:16px"><div style="font-size:14px;font-weight:600">'+p.name+'</div><div style="font-size:11px;color:#888;margin-top:4px">Check-in '+p.checkin+' • Check-out '+p.checkout+'</div><div style="margin-top:8px;display:flex;gap:6px">'+p.channels.map(function(ch){return'<span class="badge b-'+platClass(ch.channel_type)+'">'+platLabel(ch.channel_type)+'</span>';}).join('')+'</div></div>';});document.getElementById('main-content').innerHTML=h+'</div>';}
function renderMsgs(){if(!S.conversations||!S.conversations.length){document.getElementById('main-content').innerHTML='<div style="color:#888;padding:20px;text-align:center">Aucune conversation.</div>';return;}document.getElementById('main-content').innerHTML='<div class="card">'+S.conversations.map(function(c){var div=document.createElement('div');div.className='msg-row'+(c.unread?' unread':'');div.onclick=function(){openConv(c.id);};div.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between"><div style="font-size:13px;font-weight:'+(c.unread?700:400)+'">'+c.guest+'</div><span class="badge b-'+platClass(c.platform)+'">'+platLabel(c.platform)+'</span></div><div style="font-size:11px;color:#888;margin-top:3px">'+c.preview+'</div>';return div.outerHTML;}).join('')+'</div>';document.querySelectorAll('.msg-row').forEach(function(el,i){el.onclick=function(){openConv(S.conversations[i].id);};});}
function openConv(id){var c=S.conversations.find(function(x){return x.id===id;});if(!c)return;var mid=id;showModal('<h3>'+c.guest+'</h3><div style="background:#f9f9f9;border-radius:8px;padding:12px;margin-bottom:12px;font-size:13px">'+c.preview+'</div><div class="form-row"><textarea id="msg-input" placeholder="Votre message..." style="height:80px;width:100%"></textarea></div><div class="modal-actions"><button class="btn" onclick="closeModal()">Fermer</button><button class="btn btn-green" onclick="sendMsg(currentConvId)">Envoyer</button></div>');currentConvId=id;}
async function sendMsg(id){var m=document.getElementById('msg-input');if(!m||!m.value.trim()){showToast('Message vide.');return;}try{await api('/conversations/'+id,'POST',{content:m.value});showToast('✓ Envoyé');closeModal();}catch(e){showToast('Erreur: '+e.message);}}
function openAddRes(){showModal('<h3>Nouvelle réservation</h3><div class="form-row"><div class="form-label">Bien</div><select id="ar-p">'+S.props.map(function(p){return'<option value="'+p.id+'">'+p.name+'</option>';}).join('')+'</select></div><div class="form-row"><div class="form-label">Voyageur</div><input type="text" id="ar-g" placeholder="Nom"></div><div class="form-row"><div class="form-label">Arrivée</div><input type="date" id="ar-ci"></div><div class="form-row"><div class="form-label">Départ</div><input type="date" id="ar-co"></div><div class="form-row"><div class="form-label">Montant €</div><input type="number" id="ar-a" min="0"></div><div class="modal-actions"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-green" onclick="saveNewRes()">Créer</button></div>');}
function saveNewRes(){var p=document.getElementById('ar-p'),g=document.getElementById('ar-g'),ci=document.getElementById('ar-ci'),co=document.getElementById('ar-co'),a=document.getElementById('ar-a');if(!g||!g.value||!ci||!ci.value||!co||!co.value){showToast('Remplis tous les champs.');return;}S.reservations.push({id:'d-'+Date.now(),guest:g.value,platform:'direct',check_in:ci.value,check_out:co.value,amount:parseFloat(a?a.value:0)||0,currency:'EUR',commission:0,status:'accepted',stay_status:'checkin_pending',guests:1,phone:'',email:'',prop_id:p?p.value:'',booked_at:new Date().toISOString()});closeModal();render();showToast('✓ Créée');}
function openBlock(){showModal('<h3>Bloquer des dates</h3><div class="form-row"><div class="form-label">Bien</div><select id="bl-p">'+S.props.map(function(p){return'<option value="'+p.id+'">'+p.name+'</option>';}).join('')+'</select></div><div class="form-row"><div class="form-label">Du</div><input type="date" id="bl-f"></div><div class="form-row"><div class="form-label">Au</div><input type="date" id="bl-t"></div><div class="modal-actions"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-green" onclick="saveBlock()">Bloquer</button></div>');}
async function saveBlock(){var p=document.getElementById('bl-p'),f=document.getElementById('bl-f'),t=document.getElementById('bl-t');if(!f||!f.value||!t||!t.value){showToast('Choisis les dates.');return;}try{await api('/availabilities','POST',{property_id:p?p.value:'',start_date:f.value,end_date:t.value,status:'unavailable'});showToast('✓ Bloqué');}catch(e){showToast('Erreur: '+e.message);}closeModal();}
function openResDetail(id){var r=S.reservations.find(function(x){return x.id===id;});if(!r)return;var prop=S.props.find(function(p){return p.id===r.prop_id;});var isB=platClass(r.platform)==='booking';var net=isB?r.amount-r.commission:r.amount;showModal('<h3>'+r.guest+'</h3><div style="display:grid;gap:8px;font-size:13px"><div style="display:flex;justify-content:space-between"><span style="color:#888">Bien</span><span>'+(prop?prop.name:'—')+'</span></div><div style="display:flex;justify-content:space-between"><span style="color:#888">Plateforme</span><span class="badge b-'+platClass(r.platform)+'">'+platLabel(r.platform)+'</span></div><div style="display:flex;justify-content:space-between"><span style="color:#888">Arrivée</span><span>'+fmt(r.check_in)+'</span></div><div style="display:flex;justify-content:space-between"><span style="color:#888">Départ</span><span>'+fmt(r.check_out)+'</span></div><div style="display:flex;justify-content:space-between"><span style="color:#888">Durée</span><span>'+nights(r.check_in,r.check_out)+' nuits</span></div><div style="display:flex;justify-content:space-between;border-top:1px solid #f0efe9;padding-top:8px"><span style="color:#888">Brut</span><span style="font-weight:600">'+Math.round(r.amount).toLocaleString('fr-FR')+' €</span></div>'+(r.commission>0?'<div style="display:flex;justify-content:space-between"><span style="color:#888">Commission</span><span style="color:#E24B4A">-'+Math.round(r.commission).toLocaleString('fr-FR')+' €</span></div>':'')+'<div style="display:flex;justify-content:space-between"><span style="color:#888">Net</span><span style="font-weight:700;color:#1D9E75;font-size:15px">'+Math.round(net).toLocaleString('fr-FR')+' €</span></div>'+(r.phone?'<div style="display:flex;justify-content:space-between"><span style="color:#888">Tél</span><span>'+r.phone+'</span></div>':'')+'</div><div class="modal-actions"><button class="btn" onclick="closeModal()">Fermer</button></div>');}
function showModal(html){document.getElementById('modal-inner').innerHTML=html;document.getElementById('modal').style.display='flex';}
function closeModal(){document.getElementById('modal').style.display='none';}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}

setTimeout(loadAll, 50);



</script>
</body>
</html>
