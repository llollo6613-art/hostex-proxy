<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Illiberis Manager</title>
<style>



*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;font-size:14px;background:#f5f4f0}
.app{display:flex;min-height:100vh}
.sidebar{width:210px;flex-shrink:0;border-right:1px solid #e5e4e0;background:#f0efe9;display:flex;flex-direction:column;position:fixed;height:100vh;left:0;top:0}
.sidebar-top{padding:16px;border-bottom:1px solid #e5e4e0}
.logo{font-size:14px;font-weight:600;color:#1a1a1a}
.logo-sub{font-size:11px;color:#888;margin-top:3px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:13px;color:#666;transition:background 0.1s}
.nav-item.active,.nav-item:hover{background:#fff;color:#1a1a1a}
.nav-badge{margin-left:auto;background:#E24B4A;color:white;border-radius:20px;font-size:10px;padding:1px 6px}
.sidebar-bottom{margin-top:auto;padding:12px 16px;border-top:1px solid #e5e4e0;font-size:11px;color:#888}
.main{flex:1;margin-left:210px;display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #e5e4e0;background:#fff;position:sticky;top:0;z-index:10;gap:10px;flex-wrap:wrap}
.page-title{font-size:15px;font-weight:600}
.btn{font-size:12px;padding:6px 14px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#1a1a1a;cursor:pointer;transition:background 0.1s}
.btn:hover{background:#f5f4f0}
.btn-green{background:#1D9E75;color:white;border-color:#1D9E75}
.btn-green:hover{background:#0F6E56}
.btn-red{background:#E24B4A;color:white;border-color:#E24B4A}
.content{flex:1;padding:20px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:800px){.grid4{grid-template-columns:repeat(2,1fr)}}
.stat{background:#fff;border-radius:10px;padding:12px 16px;border:1px solid #e5e4e0}
.stat-l{font-size:11px;color:#888;margin-bottom:4px}
.stat-v{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.stat-s{font-size:11px;color:#aaa}
.section-h{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
.card{background:#fff;border-radius:10px;border:1px solid #e5e4e0;overflow:hidden}
.res-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #f5f4f0;gap:8px;flex-wrap:wrap}
.res-row:last-child{border-bottom:none}
.res-guest{font-size:13px;font-weight:600}
.res-meta{font-size:11px;color:#888;margin-top:2px}
.res-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.b-airbnb{background:#FFE8EC;color:#C8523E}
.b-booking{background:#E6EFF8;color:#2E5F9E}
.b-direct{background:#E0F5F3;color:#3D8B78}
.b-ok{background:#E1F5EE;color:#0F6E56}
.tabs{display:flex;gap:2px;padding:8px 12px;border-bottom:1px solid #e5e4e0;overflow-x:auto}
.tab{font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;color:#666;white-space:nowrap}
.tab.active{background:#f0efe9;color:#1a1a1a;font-weight:600}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:20px;max-width:480px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:10px;border-top:1px solid #f0efe9}
.conflict-banner{background:#FEF3C7;border:1px solid #F59E0B;border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
input,textarea,select{font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:7px;width:100%;outline:none;font-family:inherit}
input:focus,textarea:focus,select:focus{border-color:#1D9E75}
.form-row{margin-bottom:10px}
.form-label{font-size:11px;color:#888;margin-bottom:4px}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid #ddd;border-top-color:#1D9E75;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;z-index:200;pointer-events:none}
.toast.show{opacity:1}
.rate-card{background:#fff;border:1px solid #e5e4e0;border-radius:10px;padding:14px;margin-bottom:12px}
.msg-row{padding:10px 14px;border-bottom:1px solid #f5f4f0;cursor:pointer}
.msg-row:hover{background:#f9f9f9}
.msg-row.unread{background:#f0f9ff}



</style>
</head>

async function api(path,method='GET',body=null,timeoutMs=6000){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),timeoutMs);
  try{
    const opts={method,headers:{'Content-Type':'application/json'},signal:ctrl.signal};
    if(body)opts.body=JSON.stringify(body);
    const r=await fetch(PROXY+'/api'+path,opts);
    clearTimeout(timer);
    return r.json();
  }catch(e){clearTimeout(timer);throw e;}
}

function dStr(d){return d.toISOString().slice(0,10);}
function parseD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function nights(a,b){return Math.round((parseD(b)-parseD(a))/86400000);}

function mapRes(r){
  var amt=0;
  if(r.rates&&r.rates.total_rate&&r.rates.total_rate.amount)amt=parseFloat(r.rates.total_rate.amount);

  if(r.rates&&r.rates.total_commission&&r.rates.total_commission.amount)com=parseFloat(r.rates.total_commission.amount);
  else if(r.rates&&r.rates.commission&&r.rates.commission.amount)com=parseFloat(r.rates.commission.amount);
  else if(r.c)com=parseFloat(r.c);
  return{id:String(r.reservation_code||r.id||r.code||''),guest:r.guest_name||r.g||'Voyageur',platform:r.channel_type||r.pl||r.channel||'direct',check_in:r.check_in_date||r.ci||r.check_in||'',check_out:r.check_out_date||r.co||r.check_out||'',amount:amt,currency:'EUR',commission:com,status:r.status||r.st||'confirmed',stay_status:r.stay_status||r.ss||'',guests:r.number_of_guests||r.n||1,phone:r.guest_phone||r.ph||'',email:r.guest_email||r.em||'',prop_id:String(r.property_id||r.pi||''),booked_at:r.booked_at||r.b||''};
}
function loadFromCSV(){
  const map={};
  for(const r of CSV_DATA){
    const key=r.reservation_code||r.id;
    map[key]=mapRes(r);
  }
  return Object.values(map).sort((a,b)=>(b.check_in||'').localeCompare(a.check_in||''));
}

async function syncLive(){
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),8000);
    const rd=await fetch(PROXY+'/all-reservations',{signal:controller.signal});
    clearTimeout(timeout);
    const data=await rd.json();
    const liveRes=data.data?.reservations||[];
    if(!liveRes.length)return;
    const map={};
    for(const r of S.reservations)map[r.id]=r;
    for(const r of liveRes){const key=r.reservation_code||r.id;map[key]=mapRes(r);}
    S.reservations=Object.values(map).sort((a,b)=>(b.check_in||'').localeCompare(a.check_in||''));
    document.getElementById('conn-label').innerHTML='&#10003; '+S.reservations.length+' r\u00e9servations';
    document.getElementById('live-badge').innerHTML='<span class="badge b-ok">Live</span>';
    if(S.page==='dashboard'||S.page==='calendar')render();
  }catch(e){
    document.getElementById('live-badge').innerHTML='<span class="badge" style="background:#f5f4f0;color:#888">CSV</span>';
  }
}

function checkConflicts(){
  const c=[];
  for(const prop of S.props){
    const res=S.reservations.filter(r=>r.prop_id===prop.id&&r.check_in&&r.check_out);
    for(let i=0;i<res.length;i++)for(let j=i+1;j<res.length;j++)
      if(parseD(res[i].check_in)<parseD(res[j].check_out)&&parseD(res[i].check_out)>parseD(res[j].check_in))c.push({a:res[i],b:res[j]});
  }
  return c;
}

async function _applyBaseRules(propId){
  if(!S.ratesRules)S.ratesRules={};
  var r=S.ratesRules[propId]||{};
  r.airWeek=parseInt(document.getElementById('rr-airWeek').value)||75;
  r.bkWeek=parseInt(document.getElementById('rr-bkWeek').value)||70;
  r.airWE=parseInt(document.getElementById('rr-airWE').value)||95;
  r.bkWE=parseInt(document.getElementById('rr-bkWE').value)||88;
  r.minStay=parseInt(document.getElementById('rr-minStay').value)||2;
  S.ratesRules[propId]=r;

  var prop=S.props.find(function(p){return p.id===propId;});
  var m=S.ratesMonth||new Date();
  var year=m.getFullYear(),month=m.getMonth();
  var dim=new Date(year,month+1,0).getDate();
  var airPrices=[],bkPrices=[];

  for(var d=1;d<=dim;d++){
    var date=new Date(year,month,d);
    var ds=dStr(date);
    var isBooked=S.reservations.some(function(rv){return rv.prop_id===propId&&rv.check_in&&rv.check_out&&rv.status!=='cancelled'&&rv.check_in<=ds&&rv.check_out>ds;});
    if(isBooked)continue;
    var dow=date.getDay();
    var isWE=dow===0||dow===5||dow===6;
    var ap=isWE?r.airWE:r.airWeek;
    var bp=isWE?r.bkWE:r.bkWeek;
    S.ratesPrices[propId+'_'+ds+'_air']=ap;
    S.ratesPrices[propId+'_'+ds+'_bk']=bp;
    airPrices.push({date:ds,price:ap});
    bkPrices.push({date:ds,price:bp});
  }

  showToast('Envoi de '+airPrices.length+' tarifs…');
  var airCh=prop?prop.channels.filter(function(c){return platClass(c.channel_type)==='airbnb';}):[];
  var bkCh=prop?prop.channels.filter(function(c){return platClass(c.channel_type)==='booking';}):[];
  var errors=0;
  try{
    if(airCh.length){for(var i=0;i<airPrices.length;i+=30)await api('/listings/prices','POST',{listing_id:airCh[0].listing_id,prices:airPrices.slice(i,i+30)});}
    if(bkCh.length){for(var i=0;i<bkPrices.length;i+=30)await api('/listings/prices','POST',{listing_id:bkCh[0].listing_id,prices:bkPrices.slice(i,i+30)});}
    if(r.minStay>0)await api('/listings/restrictions','POST',{property_id:propId,min_nights:r.minStay});
    showToast('✓ '+airPrices.length+' jours synchronisés sur Airbnb + Booking');
  }catch(e){showToast('Partiel : '+e.message);}
  S.ratesLoaded={};renderRates();
}

async function _saveBookingOptions(propId){
  if(!S.ratesRules)S.ratesRules={};
  if(!S.ratesRules[propId])S.ratesRules[propId]={};
  var r=S.ratesRules[propId];
  var opts=['nonref','early','lastmin','weekly'];
  opts.forEach(function(id){
    if(!r[id])r[id]={on:false,pct:10};
    var pctEl=document.getElementById('pct-'+id);
    var daysEl=document.getElementById('days-'+id);
    if(pctEl)r[id].pct=parseInt(pctEl.value)||10;
    if(daysEl)r[id].days=parseInt(daysEl.value)||7;
  });
  S.ratesRules[propId]=r;

  showToast('Sync options Booking…');
  var prop=S.props.find(function(p){return p.id===propId;});
  var bkCh=prop?prop.channels.filter(function(c){return platClass(c.channel_type)==='booking';}):[];
  try{
    if(bkCh.length){
      var promotions=[];
      if(r.nonref&&r.nonref.on)promotions.push({type:'non_refundable',discount:r.nonref.pct});
      if(r.early&&r.early.on)promotions.push({type:'early_bird',discount:r.early.pct,days_in_advance:r.early.days});
      if(r.lastmin&&r.lastmin.on)promotions.push({type:'last_minute',markup:r.lastmin.pct,days_before:r.lastmin.days});
      if(r.weekly&&r.weekly.on)promotions.push({type:'weekly_stay',discount:r.weekly.pct});
      await api('/listings/promotions','POST',{listing_id:bkCh[0].listing_id,promotions:promotions});
    }
    showToast('✓ Options Booking synchronisées');
  }catch(e){
    showToast('Enregistré localement (API: '+e.message+')');
  }
  renderRates();
}


function _aiSuggestPrice(date, propId){
  var d = new Date(date+'T00:00:00');
  var month = d.getMonth(); // 0=jan
  var dow = d.getDay(); // 0=dim
  var isWE = dow===0||dow===5||dow===6;
  var bp = (S.basePrices&&S.basePrices[propId])||{airWeek:80,airWE:95};
  var base = isWE ? bp.airWE : bp.airWeek;
  
  // Coefficients saisonniers pour Perpignan/Languedoc-Roussillon
  var seasonal = [0.75,0.75,0.85,0.90,1.05,1.20,1.50,1.55,1.25,0.90,0.80,0.80];
  var coef = seasonal[month];
  
  // Bonus week-end été
  if(isWE && (month>=5 && month<=8)) coef *= 1.10;
  
  // Événements locaux Perpignan
  var ds = date;
  var events = {
    '2026-07-14':1.3,'2026-07-15':1.3, // Fête nationale
    '2026-08-15':1.2,'2026-08-16':1.2, // Assomption
    '2026-05-01':1.1,'2026-05-08':1.1, // Jours fériés
    '2026-06-21':1.15, // Fête de la musique
  };
  if(events[ds]) coef *= events[ds];
  
  var suggested = Math.round(base * coef / 5) * 5; // Arrondi à 5€
  var diff = suggested - base;
  var pct = Math.round(diff/base*100);
  return {price: suggested, pct: pct, coef: coef};
}

function _rcClick(ds){
  var n=Object.keys(S.ratesSelected).filter(function(k){return S.ratesSelected[k];}).length;
  if(S.ratesSelMode){
    // Mode selection : clic simple = toggle case
    if(S.ratesSelected[ds]){delete S.ratesSelected[ds];}
    else{S.ratesSelected[ds]=true;}
    renderRates();
    return;
  }
  if(S.ratesSelected[ds]){
    delete S.ratesSelected[ds];
    var n2=Object.keys(S.ratesSelected).filter(function(k){return S.ratesSelected[k];}).length;
    if(n2===0){renderRates();_openRateDay(ds,S.ratesProp);return;}
  } else if(n>0){
    // Des cases deja selectionnees : ajouter celle-ci
    S.ratesSelected[ds]=true;
  } else {
    // Aucune selection : ouvrir directement
    _openRateDay(ds,S.ratesProp);return;
  }
  renderRates();
}
function _toggleSelMode(){
  S.ratesSelMode=!S.ratesSelMode;
  S.ratesSelected={};
  renderRates();
}

async function _rSaveBulk(){
  var av=parseInt(document.getElementById('bs-air').value)||0;var bv=parseInt(document.getElementById('bs-bk').value)||0;if(!av&&!bv){showToast('Entre un prix.');return;}
  var opt=document.querySelector('input[name="bs-opt"]:checked');var f=opt&&opt.value==='nonref'?0.85:opt&&opt.value==='early'?0.90:opt&&opt.value==='lastmin'?1.05:1;
  var days=Object.keys(S.ratesSelected).filter(function(k){return S.ratesSelected[k];});closeModal();
  var prop=S.props.find(function(p){return p.id===S.ratesProp;});var aP=[],bP=[];
  days.forEach(function(ds){var k=S.ratesProp+'_'+ds;if(av){S.ratesPrices[k+'_air']=av;aP.push({date:ds,price:av});}if(bv){S.ratesPrices[k+'_bk']=Math.round(bv*f);bP.push({date:ds,price:Math.round(bv*f)});}});
  showToast('Envoi…');
  try{var aC=prop?prop.channels.filter(function(c){return platClass(c.channel_type)==='airbnb';}):[];var bC=prop?prop.channels.filter(function(c){return platClass(c.channel_type)==='booking';}):[];if(av&&aC.length){for(var i=0;i<aP.length;i+=30)await api('/listings/prices','POST',{listing_id:aC[0].listing_id,prices:aP.slice(i,i+30)});}if(bv&&bC.length){for(var i=0;i<bP.length;i+=30)await api('/listings/prices','POST',{listing_id:bC[0].listing_id,prices:bP.slice(i,i+30)});}showToast('✓ '+days.length+' jours mis à jour');}catch(e){showToast('Local OK');}

}

async function _loadPricesFromAPI(propId){
  var prop=S.props.find(function(p){return p.id===propId;});
  if(!prop||!prop.channels.length){showToast('Aucun channel');return;}
  var m=S.ratesMonth||new Date();
  var from=dStr(new Date(m.getFullYear(),m.getMonth(),1));
  var to=dStr(new Date(m.getFullYear(),m.getMonth()+1,0));
  showToast('Chargement '+prop.channels.length+' canaux...');
  var total=0;
  for(var ci=0;ci<prop.channels.length;ci++){
    var ch=prop.channels[ci];
    var type=platClass(ch.channel_type);
    try{
      var data=await api('/listings/calendar','POST',{listings:[{listing_id:ch.listing_id,channel_type:ch.channel_type}],start_date:from,end_date:to});
      console.log('Prices API response:', JSON.stringify(data).slice(0,200));
      var listings=(data&&data.data&&data.data.listings)||[];
      console.log('Calendar found:', listings.length, 'for', ch.listing_id);
      listings.forEach(function(lst){
        var days=lst.calendar||[];
        days.forEach(function(p){
          if(p.price&&p.date){
            S.ratesPrices[propId+'_'+p.date+'_'+(type==='airbnb'?'air':'bk')]=parseInt(p.price);
            total++;
          }
        });
      });
    }catch(e){
      console.error('Error loading prices for',ch.listing_id,e.message);
      showToast('Erreur canal '+type+': '+e.message);
    }
  }
  showToast(total>0?('✓ '+total+' tarifs chargés'):'Aucun tarif retourné par Hostex');
  renderRates();
}

async function _syncNewReservations(){
  try{
    var data=await api('/reservations?page_size=200&sort=check_in_date&sort_order=desc');
    var liveRes=(data&&data.data&&data.data.reservations)||[];
    if(!liveRes.length)return;
    var map={};
    for(var i=0;i<S.reservations.length;i++)map[S.reservations[i].id]=S.reservations[i];
    var added=0;
    for(var i=0;i<liveRes.length;i++){
      var r=liveRes[i];
      var key=r.reservation_code||r.id;
      if(!map[key]){map[key]=mapRes(r);added++;}
      else{map[key]=mapRes(r);}
    }
    S.reservations=Object.values(map).sort(function(a,b){return(b.check_in||'').localeCompare(a.check_in||'');});
    if(added>0){showToast('✓ '+added+' nouvelle(s) réservation(s)');render();}
  }catch(e){console.log('Sync failed:',e.message);}
}

function renderCal(){
  const year=S.currentMonth.getFullYear(), month=S.currentMonth.getMonth();
  const dim=new Date(year,month+1,0).getDate();
  const firstDay=(new Date(year,month,1).getDay()+6)%7;
  const dPrev=new Date(year,month,0).getDate();
  const total=Math.ceil((firstDay+dim)/7)*7;
  const JOURS=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
  const MOIS=["Janvier","F\u00e9vrier","Mars","Avril","Mai","Juin","Juillet","Ao\u00fbt","Septembre","Octobre","Novembre","D\u00e9cembre"];
  const view=S.calView||"single";

  const CP={"airbnb":"#C8523E","booking.com":"#2E5F9E","booking":"#2E5F9E","direct":"#3D8B78"};
  const CPN={"airbnb":"Airbnb","booking.com":"Booking","booking":"Booking","direct":"Direct"};
  const CBG=["#6B5B9E","#3D8B6A"];
  const RAD="7px";

  // Comparaison de dates UNIQUEMENT sur la string YYYY-MM-DD (pas d'objet Date)
  // Evite tous les bugs de comparaison d'objets Date en JS
  function ds2n(s){return parseInt(s.replace(/-/g,""),10);}  // "2026-04-17" -> 20260417

  // Attribue un index de ligne FIXE a chaque reservation pour tout l'historique
  // Toutes les resa du bien, triees par check_in
  // rowEnd[i] = numero de date de fin de la ligne i (string YYYY-MM-DD)
  function computeRows(propId){
    const res=S.reservations
      .filter(function(r){return r.prop_id===propId&&r.check_in&&r.check_out&&r.status!=="cancelled";})
      .slice()
      .sort(function(a,b){return a.check_in<b.check_in?-1:a.check_in>b.check_in?1:0;});
    const rowEnd=[]; // stocke la date check_out (string) de chaque ligne
    const rowOf={};
    res.forEach(function(r){
      const ciN=ds2n(r.check_in);
      var row=-1;
      for(var i=0;i<rowEnd.length;i++){
        // La ligne est libre si le check_in de r est >= check_out de ce qui occupe la ligne
        if(ciN>=ds2n(rowEnd[i])){row=i;break;}
      }
      if(row===-1){row=rowEnd.length;rowEnd.push("");}
      rowEnd[row]=r.check_out;
      rowOf[r.id]=row;
    });
    return {rowOf:rowOf, nRows:Math.max(1,rowEnd.length)};
  }

  // Genere les divs de barres pour une cellule (ds=date string)
  function cellBars(ds, propRes, rowOf, topOff, barH, colorFn){
    const dsN=ds2n(ds);
    var out="";
    propRes.forEach(function(r){
      const ciN=ds2n(r.check_in), coN=ds2n(r.check_out);
      // Actif si check_in<=date ET check_out>=date (check_out inclus = jour depart)
      if(ciN>dsN||coN<dsN)return;
      const row=rowOf[r.id]||0;
      const col=colorFn(r);
      const arr=r.check_in===ds, dep=r.check_out===ds;
      const top=topOff+row*(barH+2);
      const name=(r.guest||"").split(" ")[0];

      // ARRONDI : arrivee=gauche arrondi+droite carree, depart=gauche carre+droite arrondie
      var L,R,TL,BL,TR,BR;
      if(arr&&dep){L="3px";R="3px";TL=RAD;BL=RAD;TR=RAD;BR=RAD;}
      else if(arr){L="50%";R="0";  TL=RAD;BL=RAD;TR="0"; BR="0"; }
      else if(dep){L="0";  R="50%";TL="0"; BL="0"; TR=RAD;BR=RAD;}
      else        {L="0";  R="0";  TL="0"; BL="0"; TR="0"; BR="0";}

      // Nom affiché UNE SEULE FOIS : case arrivée ou 1er jour visible du mois
      const isFirstVisible=(!arr&&ds===dStr(new Date(year,month,1)));
      const label=(arr||isFirstVisible)&&name?('<span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:8px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;pointer-events:none;max-width:90%">'+name+'</span>'):"";

      out+="<div onclick=\"event.stopPropagation();openResDetail('"+r.id+"')\" title=\""+(r.guest||"")+" - "+platLabel(r.platform)+" - "+fmt(r.check_in)+" -> "+fmt(r.check_out)+"\" style=\"position:absolute;left:"+L+";right:"+R+";top:"+top+"px;height:"+barH+"px;background:"+col+";border-top-left-radius:"+TL+";border-bottom-left-radius:"+BL+";border-top-right-radius:"+TR+";border-bottom-right-radius:"+BR+";cursor:pointer;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,0.18);\" onmouseover=\"this.style.opacity=.75\" onmouseout=\"this.style.opacity=1\">"+label+"</div>";
    });
    return out;
  }

  const TH="font-size:10px;color:#888;text-align:center;padding:6px 2px;font-weight:600;background:#f5f4f0;border:1px solid #e5e4e0;";
  const thead="<tr>"+JOURS.map(function(d){return"<th style=\""+TH+"\">"+d+"</th>";}).join("")+"</tr>";

  function mStats(propId){
    var r=S.reservations.filter(function(r){return r.prop_id===propId&&r.check_in&&r.status!=="cancelled"&&(function(){var d=parseD(r.check_in);return d.getMonth()===month&&d.getFullYear()===year;})();});
    return {n:r.length,rev:r.reduce(function(s,x){return s+x.amount;},0)};
  }

  const legItems=["airbnb","booking.com","direct"].map(function(k){
    return "<span style=\"display:inline-flex;align-items:center;gap:4px;font-size:10px\"><span style=\"width:18px;height:10px;border-radius:5px;background:"+CP[k]+";display:inline-block\"></span><b style=\"color:#555\">"+CPN[k]+"</b></span>";
  }).join("");

  const nav="<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px\">"
    +"<div style=\"display:flex;align-items:center;gap:8px\">"
    +"<button class=\"btn\" onclick=\"chgMonth(-1)\" style=\"font-size:16px;padding:4px 14px\">\u2039</button>"
    +"<span style=\"font-size:15px;font-weight:700;min-width:160px;text-align:center\">"+MOIS[month]+" "+year+"</span>"
    +"<button class=\"btn\" onclick=\"chgMonth(1)\" style=\"font-size:16px;padding:4px 14px\">\u203a</button>"
    +"<button class=\"btn\" style=\"font-size:11px\" onclick=\"S.currentMonth=new Date();render()\">Auj.</button>"
    +"</div>"
    +"<div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">"
    +(view==="single"?legItems:"")
    +"<div style=\"display:flex;gap:4px\">"
    +"<button class=\"btn"+(view==="single"?" btn-green":"")+"\" style=\"font-size:11px\" onclick=\"S.calView='single';render()\">Par bien</button>"
    +"<button class=\"btn"+(view==="global"?" btn-green":"")+"\" style=\"font-size:11px\" onclick=\"S.calView='global';render()\">Vue globale</button>"
    +"</div></div></div>";

  // ── VUE PAR BIEN ─────────────────────────────────────────────────────
  if(view==="single"){
    const BAR=18, LABEL=20;
    const propRes=S.reservations.filter(function(r){return r.prop_id===S.selectedProp&&r.check_in&&r.check_out&&r.status!=="cancelled";});
    const info=computeRows(S.selectedProp);
    const cellH=Math.max(62, LABEL+info.nRows*(BAR+2)+6);
    var tds="";
    for(var i=0;i<total;i++){
      var day,cur=true;
      if(i<firstDay){day=dPrev-firstDay+i+1;cur=false;}
      else if(i>=firstDay+dim){day=i-firstDay-dim+1;cur=false;}
      else day=i-firstDay+1;
      const date=cur?new Date(year,month,day):i<firstDay?new Date(year,month-1,day):new Date(year,month+1,day);
      const ds=dStr(date);
      const isToday=ds===dStr(new Date());
      const isWE=date.getDay()===0||date.getDay()===6;
      const bg=isToday?"#FFFBF0":isWE&&cur?"#FAFAFA":"#fff";
      const bd=isToday?"2px solid #F59E0B":"1px solid #e5e4e0";
      const bars=cellBars(ds,propRes,info.rowOf,LABEL,BAR,function(r){return CP[r.platform]||CP["direct"];});
      tds+="<td onclick=\"_dc('"+ds+"','"+S.selectedProp+"')\" style=\"border:"+bd+";height:"+cellH+"px;vertical-align:top;padding:4px 2px 2px;cursor:pointer;background:"+bg+";opacity:"+(cur?1:0.3)+";position:relative;\" onmouseover=\"if("+(cur?1:0)+")this.style.background='"+(isToday?"#FFF3D0":"#F5F4F0")+"'\" onmouseout=\"this.style.background='"+bg+"'\">"
        +"<div style=\"font-size:10px;font-weight:"+(isToday?700:400)+";color:"+(isToday?"#92400E":"#ccc")+"\">"+day+(propRes.some(r=>r.check_out===ds)?" 🧹":"")+"</div>"
        +bars+"</td>";
      if((i+1)%7===0&&i<total-1)tds+="</tr><tr>";
    }
    const st=mStats(S.selectedProp);
    const prop=S.props.find(function(p){return p.id===S.selectedProp;})||{name:""};
    document.getElementById("main-content").innerHTML=nav
      +"<div style=\"display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap\">"
      +S.props.map(function(p){return"<button class=\"btn"+(S.selectedProp===p.id?" btn-green":"")+"\" style=\"font-size:11px\" onclick=\"S.selectedProp='"+p.id+"';render()\">"+p.name+"</button>";}).join("")
      +"</div>"
      +"<div style=\"font-size:11px;color:#888;margin-bottom:10px\">"+prop.name+" \u2014 "+st.n+"\u00a0r\u00e9s. \u00b7 "+Math.round(st.rev).toLocaleString("fr-FR")+"\u00a0\u20ac</div>"
      +"<div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;min-width:560px\">"+thead+"<tr>"+tds+"</tr></table></div>";

  // ── VUE GLOBALE ──────────────────────────────────────────────────────
  } else {
    const BAR=17, LABEL=18, SEP=10;
    const info0=S.props[0]?computeRows(S.props[0].id):{rowOf:{},nRows:1};
    const info1=S.props[1]?computeRows(S.props[1].id):{rowOf:{},nRows:1};
    const res0=S.props[0]?S.reservations.filter(function(r){return r.prop_id===S.props[0].id&&r.check_in&&r.check_out&&r.status!=="cancelled";}):[];
    const res1=S.props[1]?S.reservations.filter(function(r){return r.prop_id===S.props[1].id&&r.check_in&&r.check_out&&r.status!=="cancelled";}):[];
    const OFF0=LABEL;
    const OFF1=OFF0+info0.nRows*(BAR+2)+SEP;
    const CELL_H=OFF1+info1.nRows*(BAR+2)+8;

    var tds="";
    for(var i=0;i<total;i++){
      var day,cur=true;
      if(i<firstDay){day=dPrev-firstDay+i+1;cur=false;}
      else if(i>=firstDay+dim){day=i-firstDay-dim+1;cur=false;}
      else day=i-firstDay+1;
      const date=cur?new Date(year,month,day):i<firstDay?new Date(year,month-1,day):new Date(year,month+1,day);
      const ds=dStr(date);
      const isToday=ds===dStr(new Date());
      const isWE=date.getDay()===0||date.getDay()===6;
      const bg=isToday?"#FFFBF0":isWE&&cur?"#FAFAFA":"#fff";
      const bd=isToday?"2px solid #F59E0B":"1px solid #e5e4e0";
      const sep="<div style=\"position:absolute;left:4px;right:4px;top:"+(OFF1-SEP/2)+"px;height:1px;background:#e0ddd8;pointer-events:none\"></div>";
      const b0=cellBars(ds,res0,info0.rowOf,OFF0,BAR,function(){return CBG[0];});
      const b1=cellBars(ds,res1,info1.rowOf,OFF1,BAR,function(){return CBG[1];});
      tds+="<td onclick=\"_dg('"+ds+"')\" style=\"border:"+bd+";height:"+CELL_H+"px;vertical-align:top;padding:4px 2px 2px;cursor:pointer;background:"+bg+";opacity:"+(cur?1:0.3)+";position:relative;\" onmouseover=\"if("+(cur?1:0)+")this.style.background='"+(isToday?"#FFF3D0":"#F5F4F0")+"'\" onmouseout=\"this.style.background='"+bg+"'\">"
        +"<div style=\"font-size:10px;font-weight:"+(isToday?700:400)+";color:"+(isToday?"#92400E":"#ccc")+"\">"+day+"</div>"
        +sep+b0+b1+"</td>";
      if((i+1)%7===0&&i<total-1)tds+="</tr><tr>";
    }
    const propLeg=S.props.map(function(p,i){
      const st=mStats(p.id);
      return"<span style=\"display:inline-flex;align-items:center;gap:5px;font-size:11px\"><span style=\"width:14px;height:14px;border-radius:4px;background:"+CBG[i]+";display:inline-block;flex-shrink:0\"></span><b>"+p.name+"</b> \u2014 "+st.n+"\u00a0r\u00e9s. \u00b7 "+Math.round(st.rev).toLocaleString("fr-FR")+"\u00a0\u20ac</span>";
    }).join("<span style=\"color:#ddd;margin:0 8px\">|</span>");

    document.getElementById("main-content").innerHTML=nav
      +"<div style=\"padding:10px 14px;background:#f9f9f9;border:1px solid #e5e4e0;border-radius:8px;margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap;align-items:center\">"+propLeg+"</div>"
      +"<div style=\"overflow-x:auto\"><table style=\"width:100%;border-collapse:collapse;min-width:600px\">"+thead+"<tr>"+tds+"</tr></table></div>";
  }
}
function chgMonth(d){S.currentMonth=new Date(S.currentMonth.getFullYear(),S.currentMonth.getMonth()+d,1);render();}

function _dc(ds,propId){
  const date=new Date(ds+"T00:00:00");
  const res=S.reservations.filter(function(r){return r.prop_id===propId&&r.check_in&&r.check_out&&r.status!=="cancelled"&&parseD(r.check_in)<=date&&parseD(r.check_out)>=date;});
  if(res.length)_calModal(ds,res);
}
function _dg(ds){
  const date=new Date(ds+"T00:00:00");
  const res=S.reservations.filter(function(r){return r.check_in&&r.check_out&&r.status!=="cancelled"&&parseD(r.check_in)<=date&&parseD(r.check_out)>=date;});
  if(res.length)_calModal(ds,res);
}
function _calModal(ds,res){
  const date=new Date(ds+"T00:00:00");
  const BG={"airbnb":"#C8523E","booking.com":"#2E5F9E","booking":"#2E5F9E","direct":"#3D8B78"};
  showModal("<h3>"+date.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})+"</h3>"
    +res.map(function(r){
      const bg=BG[r.platform]||"#3D8B78";
      const arr=dStr(parseD(r.check_in))===ds, dep=dStr(parseD(r.check_out))===ds;
      const prop=S.props.find(function(p){return p.id===r.prop_id;});
      return"<div style=\"border-left:4px solid "+bg+";background:#f9f9f9;border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:8px\">"
        +"<div style=\"font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap\">"+(r.guest||"")
        +(arr?" <span style=\"font-size:10px;background:#E1F5EE;color:#0F6E56;padding:1px 7px;border-radius:10px\">Arriv\u00e9e</span>":"")
        +(dep?" <span style=\"font-size:10px;background:#FCEBEB;color:#A32D2D;padding:1px 7px;border-radius:10px\">D\u00e9part</span>":"")
        +"</div>"
        +"<div style=\"font-size:11px;color:#888;margin-top:3px\">"+(prop?prop.name:"")+" \u00b7 "+platLabel(r.platform)+" \u00b7 "+fmt(r.check_in)+"\u2192"+fmt(r.check_out)+" \u00b7 "+r.amount.toLocaleString("fr-FR")+"\u00a0\u20ac</div>"
        +"<button class=\"btn\" style=\"font-size:10px;margin-top:6px;padding:3px 8px\" onclick=\"closeModal();openResDetail('"+r.id+"')\">D\u00e9tail</button>"
        +"</div>";
    }).join("")
    +"<div class=\"modal-actions\"><button class=\"btn\" onclick=\"closeModal()\">Fermer</button></div>");
}

function showModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('modal').style.display='flex';}
function closeModal(){document.getElementById('modal').style.display='none';}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}

setTimeout(loadAll, 50);



</script>
