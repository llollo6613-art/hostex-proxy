<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Illiberis Manager</title>
<style>



*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;font-size:14px;background:#f5f4f0}
.app{display:flex;min-height:100vh}
.sidebar{width:210px;flex-shrink:0;border-right:1px solid #e5e4e0;background:#f0efe9;display:flex;flex-direction:column;position:fixed;height:100vh;left:0;top:0}
.sidebar-top{padding:16px;border-bottom:1px solid #e5e4e0}
.logo{font-size:14px;font-weight:600;color:#1a1a1a}
.logo-sub{font-size:11px;color:#888;margin-top:3px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:13px;color:#666;transition:background 0.1s}
.nav-item.active,.nav-item:hover{background:#fff;color:#1a1a1a}
.nav-badge{margin-left:auto;background:#E24B4A;color:white;border-radius:20px;font-size:10px;padding:1px 6px}
.sidebar-bottom{margin-top:auto;padding:12px 16px;border-top:1px solid #e5e4e0;font-size:11px;color:#888}
.main{flex:1;margin-left:210px;display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #e5e4e0;background:#fff;position:sticky;top:0;z-index:10;gap:10px;flex-wrap:wrap}
.page-title{font-size:15px;font-weight:600}
.btn{font-size:12px;padding:6px 14px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#1a1a1a;cursor:pointer;transition:background 0.1s}
.btn:hover{background:#f5f4f0}
.btn-green{background:#1D9E75;color:white;border-color:#1D9E75}
.btn-green:hover{background:#0F6E56}
.btn-red{background:#E24B4A;color:white;border-color:#E24B4A}
.content{flex:1;padding:20px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:800px){.grid4{grid-template-columns:repeat(2,1fr)}}
.stat{background:#fff;border-radius:10px;padding:12px 16px;border:1px solid #e5e4e0}
.stat-l{font-size:11px;color:#888;margin-bottom:4px}
.stat-v{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.stat-s{font-size:11px;color:#aaa}
.section-h{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
.card{background:#fff;border-radius:10px;border:1px solid #e5e4e0;overflow:hidden}
.res-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #f5f4f0;gap:8px;flex-wrap:wrap}
.res-row:last-child{border-bottom:none}
.res-guest{font-size:13px;font-weight:600}
.res-meta{font-size:11px;color:#888;margin-top:2px}
.res-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.b-airbnb{background:#FFE8EC;color:#C8523E}
.b-booking{background:#E6EFF8;color:#2E5F9E}
.b-direct{background:#E0F5F3;color:#3D8B78}
.b-ok{background:#E1F5EE;color:#0F6E56}
.tabs{display:flex;gap:2px;padding:8px 12px;border-bottom:1px solid #e5e4e0;overflow-x:auto}
.tab{font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;color:#666;white-space:nowrap}
.tab.active{background:#f0efe9;color:#1a1a1a;font-weight:600}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:20px;max-width:480px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:10px;border-top:1px solid #f0efe9}
.conflict-banner{background:#FEF3C7;border:1px solid #F59E0B;border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
input,textarea,select{font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:7px;width:100%;outline:none;font-family:inherit}
input:focus,textarea:focus,select:focus{border-color:#1D9E75}
.form-row{margin-bottom:10px}
.form-label{font-size:11px;color:#888;margin-bottom:4px}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid #ddd;border-top-color:#1D9E75;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;z-index:200;pointer-events:none}
.toast.show{opacity:1}
.rate-card{background:#fff;border:1px solid #e5e4e0;border-radius:10px;padding:14px;margin-bottom:12px}
.msg-row{padding:10px 14px;border-bottom:1px solid #f5f4f0;cursor:pointer}
.msg-row:hover{background:#f9f9f9}
.msg-row.unread{background:#f0f9ff}



</style>
</head>

async function api(path,method='GET',body=null,timeoutMs=6000){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),timeoutMs);
  try{
    const opts={method,headers:{'Content-Type':'application/json'},signal:ctrl.signal};
    if(body)opts.body=JSON.stringify(body);
    const r=await fetch(PROXY+'/api'+path,opts);
    clearTimeout(timer);
    return r.json();
  }catch(e){clearTimeout(timer);throw e;}
}

function fmt(s){if(!s)return '';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});}
function dStr(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd;}
function parseD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function nights(a,b){return Math.round((parseD(b)-parseD(a))/86400000);}
function platClass(p){if(!p)return 'direct';const l=p.toLowerCase();if(l.includes('airbnb'))return 'airbnb';if(l.includes('booking'))return 'booking';return 'direct';}
function platLabel(p){if(!p)return 'Direct';const l=p.toLowerCase();if(l.includes('airbnb'))return 'Airbnb';if(l.includes('booking'))return 'Booking.com';return p;}

function mapRes(r){
  var amt=0;
  if(r.rates&&r.rates.total_rate&&r.rates.total_rate.amount)amt=parseFloat(r.rates.total_rate.amount);
  else if(r.rates&&r.rates.rate&&r.rates.rate.amount)amt=parseFloat(r.rates.rate.amount);
  else if(r.a)amt=parseFloat(r.a);
  var com=0;
  if(r.rates&&r.rates.total_commission&&r.rates.total_commission.amount)com=parseFloat(r.rates.total_commission.amount);
  else if(r.rates&&r.rates.commission&&r.rates.commission.amount)com=parseFloat(r.rates.commission.amount);
  else if(r.c)com=parseFloat(r.c);
  return{id:String(r.reservation_code||r.id||r.code||''),guest:r.guest_name||r.g||'Voyageur',platform:r.channel_type||r.pl||r.channel||'direct',check_in:r.check_in_date||r.ci||r.check_in||'',check_out:r.check_out_date||r.co||r.check_out||'',amount:amt,currency:'EUR',commission:com,status:r.status||r.st||'confirmed',stay_status:r.stay_status||r.ss||'',guests:r.number_of_guests||r.n||1,phone:r.guest_phone||r.ph||'',email:r.guest_email||r.em||'',prop_id:String(r.property_id||r.pi||''),booked_at:r.booked_at||r.b||''};
}
function loadFromCSV(){
  const map={};
  for(const r of CSV_DATA){
    const key=r.reservation_code||r.id;
    map[key]=mapRes(r);
  }
  return Object.values(map).sort((a,b)=>(b.check_in||'').localeCompare(a.check_in||''));
}

async function syncLive(){
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),8000);
    const rd=await fetch(PROXY+'/all-reservations',{signal:controller.signal});
    clearTimeout(timeout);
    const data=await rd.json();
    const liveRes=data.data?.reservations||[];
    if(!liveRes.length)return;
    const map={};
    for(const r of S.reservations)map[r.id]=r;
    // Ajouter/remplacer avec les données API (sans écraser accepted par cancelled)
    for(const r of liveRes){
      const key=r.reservation_code||r.id;
      const mapped=mapRes(r);
      const existing=map[key];
      if(existing&&existing.status==='accepted'&&mapped.status==='cancelled')continue;
      map[key]=mapped;
    }
    // Dedup par guest+check_in+prop_id - toujours garder accepted sur cancelled
    const seen2={};const final2={};
    // Trier: accepted en premier, puis par date de réservation (plus récent en premier)
    Object.values(map).sort((a,b)=>{
      if(a.status==='accepted'&&b.status!=='accepted')return -1;
      if(b.status==='accepted'&&a.status!=='accepted')return 1;
      return (b.booked_at||'').localeCompare(a.booked_at||'');
    }).forEach(r=>{
      const dk=(r.guest||'')+'_'+(r.check_in||'')+'_'+(r.prop_id||'');
      if(!seen2[dk]){seen2[dk]=r.id;final2[r.id]=r;}
    });
    S.reservations=Object.values(final2).sort((a,b)=>(b.check_in||'').localeCompare(a.check_in||''));
    document.getElementById('conn-label').innerHTML='&#10003; '+S.reservations.length+' r\u00e9servations';
    document.getElementById('live-badge').innerHTML='<span class="badge b-ok">Live</span>';
    if(S.page==='dashboard'||S.page==='calendar')render();
  }catch(e){
    document.getElementById('live-badge').innerHTML='<span class="badge" style="background:#f5f4f0;color:#888">CSV</span>';
  }
}

    +'Du <b>'+from+'</b> au <b>'+to+'</b><br><span style="font-size:11px;color:#888;">Fermé sur Airbnb et Booking</span>'
    +'</div>'
    +'<div class="modal-actions">'
    +'<button class="btn" onclick="closeModal()">Annuler</button>'
    +'<button class="btn btn-red" onclick="_saveBlock()">Bloquer ces dates</button>'
    +'</div>');
}

async function _saveBlock(){
  var propId=window._blockPropId;
  var sel=Object.keys(S.ratesSelected||{});
  if(!sel.length){showToast('Aucune date');return;}
  sel.sort();
  var from=sel[0],to=sel[sel.length-1];
  var prop=S.props.find(function(p){return p.id===propId;});
  if(!prop)return;
  try{
    for(var i=0;i<prop.channels.length;i++){
      var ch=prop.channels[i];
      await api('/listings/inventories','POST',{
        listing_id:ch.listing_id,
        channel_type:ch.channel_type,
        start_date:from,
        end_date:to,
        inventories:[{start_date:from,end_date:to,inventory:0}]
      });
    }
    if(!S.blockedDates)S.blockedDates=[];
    var cur=new Date(from+'T00:00:00');
    var endD=new Date(to+'T00:00:00');
    while(cur<=endD){
      var dd=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
      if(S.blockedDates.indexOf(dd)<0)S.blockedDates.push(dd);
      cur=new Date(cur.getFullYear(),cur.getMonth(),cur.getDate()+1);
    }
    showToast('✓ '+sel.length+' jour(s) bloqués');
    S.ratesSelected={};
    closeModal();
    S.ratesLoaded={};
    renderRates();
  }catch(e){showToast('Erreur: '+e.message);}
}

async function _unblockDates(propId,from,to){
  var prop=S.props.find(function(p){return p.id===propId;});
  if(!prop)return;
  try{
    for(var i=0;i<prop.channels.length;i++){
      var ch=prop.channels[i];
      await api('/listings/inventories','POST',{
        listing_id:ch.listing_id,
        channel_type:ch.channel_type,
        start_date:from,
        end_date:to,
        inventories:[{start_date:from,end_date:to,inventory:1}]
      });
    }
    showToast('✓ Dates débloquées');
    S.ratesLoaded={};
    renderRates();
  }catch(e){showToast('Erreur: '+e.message);}
}

function renderBilan(){
  var now=new Date();
  var MONTHS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  var selYear=S.bilanYear||now.getFullYear();
  var selProp=S.bilanProp||'all';

  function netRev(r){var isB=r.platform==='booking.com'||r.platform==='booking';return isB?r.amount-r.commission:r.amount;}
  function commission(r){var isB=r.platform==='booking.com'||r.platform==='booking';return isB?r.commission:0;}
  function cleaning(r){var c=S.cleaning&&S.cleaning[r.prop_id]?S.cleaning[r.prop_id]:{base:20};return c.base;}

  var years=[...new Set(S.reservations.filter(r=>r.check_in&&r.status!=='cancelled').map(r=>new Date(r.check_in+'T00:00:00').getFullYear()))].sort((a,b)=>b-a);

  function getBilan(propId){
    var res=S.reservations.filter(function(r){
      if(!r.check_in||r.status==='cancelled')return false;
      if(new Date(r.check_in+'T00:00:00').getFullYear()!==selYear)return false;
      if(propId!=='all'&&r.prop_id!==propId)return false;
      return true;
    });
    var brut=res.reduce((s,r)=>s+r.amount,0);
    var com=res.reduce((s,r)=>s+commission(r),0);
    var cl=res.reduce((s,r)=>s+cleaning(r),0);
    var net=brut-com-cl;
    var airRes=res.filter(r=>platClass(r.platform)==='airbnb');
    var bkRes=res.filter(r=>platClass(r.platform)==='booking');
    var airRev=airRes.reduce((s,r)=>s+r.amount,0);
    var bkRev=bkRes.reduce((s,r)=>s+netRev(r),0);
    var bookedDays=res.reduce((s,r)=>{if(r.check_in&&r.check_out)return s+Math.round((new Date(r.check_out)-new Date(r.check_in))/86400000);return s;},0);
    var totalDays=propId==='all'?365*S.props.length:365;
    var occ=Math.round(bookedDays/totalDays*100);
    var avgNight=bookedDays>0?Math.round(brut/bookedDays):0;
    var months=MONTHS.map((lbl,m)=>{
      var mr=res.filter(r=>new Date(r.check_in+'T00:00:00').getMonth()===m);
      return {lbl:lbl,count:mr.length,brut:mr.reduce((s,r)=>s+r.amount,0),net:mr.reduce((s,r)=>s+netRev(r)-cleaning(r),0)};
    });
    return {res,brut,com,cl,net,airRes,bkRes,airRev,bkRev,bookedDays,occ,avgNight,months};
  }

        +'<div style="font-size:12px;font-weight:'+(isCur?500:400)+';color:'+(isCur?'#0F6E56':'var(--color-text-secondary)')+';">'+m.lbl+(isCur?' \u25cf':'')+'</div>'

        +'<div style="text-align:right;font-size:12px;color:var(--color-text-primary);">'+(m.brut>0?Math.round(m.brut).toLocaleString('fr-FR')+'\u20ac':'\u2014')+'</div>'
        +'<div style="text-align:right;font-size:12px;font-weight:'+(isCur?500:400)+';color:'+(m.net>0?'#0F6E56':'var(--color-text-tertiary)')+'">'+(m.net>0?Math.round(m.net).toLocaleString('fr-FR')+'\u20ac':'\u2014')+'</div>'

function checkConflicts(){
  const c=[];
  for(const prop of S.props){
    const res=S.reservations.filter(r=>r.prop_id===prop.id&&r.check_in&&r.check_out);
    for(let i=0;i<res.length;i++)for(let j=i+1;j<res.length;j++)
      if(parseD(res[i].check_in)<parseD(res[j].check_out)&&parseD(res[i].check_out)>parseD(res[j].check_in))c.push({a:res[i],b:res[j]});
  }
  return c;
}

async function _applyBaseRules(propId){
  if(!S.ratesRules)S.ratesRules={};
  var r=S.ratesRules[propId]||{};
  r.airWeek=parseInt(document.getElementById('rr-airWeek').value)||75;
  r.bkWeek=parseInt(document.getElementById('rr-bkWeek').value)||70;
  r.airWE=parseInt(document.getElementById('rr-airWE').value)||95;
  r.bkWE=parseInt(document.getElementById('rr-bkWE').value)||88;
  r.minStay=parseInt(document.getElementById('rr-minStay').value)||2;
  S.ratesRules[propId]=r;

  var prop=S.props.find(function(p){return p.id===propId;});
  var m=S.ratesMonth||new Date();
  var year=m.getFullYear(),month=m.getMonth();
  var dim=new Date(year,month+1,0).getDate();
  var airPrices=[],bkPrices=[];

  for(var d=1;d<=dim;d++){
    var date=new Date(year,month,d);
    var ds=dStr(date);
    var isBooked=S.reservations.some(function(rv){return rv.prop_id===propId&&rv.check_in&&rv.check_out&&rv.status!=='cancelled'&&rv.check_in<=ds&&rv.check_out>ds;});
    if(isBooked)continue;
    var dow=date.getDay();
    var isWE=dow===0||dow===5||dow===6;
    var ap=isWE?r.airWE:r.airWeek;
    var bp=isWE?r.bkWE:r.bkWeek;
    S.ratesPrices[propId+'_'+ds+'_air']=ap;
    S.ratesPrices[propId+'_'+ds+'_bk']=bp;
    airPrices.push({date:ds,price:ap,start_date:ds,end_date:ds});
    bkPrices.push({date:ds,price:bp,start_date:ds,end_date:ds});
  }

  showToast('Envoi de '+airPrices.length+' tarifs…');
  var airCh=prop?prop.channels.filter(function(c){return platClass(c.channel_type)==='airbnb';}):[];
  var bkCh=prop?prop.channels.filter(function(c){return platClass(c.channel_type)==='booking';}):[];
  var errors=0;
  try{
    if(airCh.length){for(var i=0;i<airPrices.length;i+=30)await api('/listings/prices','POST',{listing_id:airCh[0].listing_id,channel_type:airCh[0].channel_type,prices:airPrices.slice(i,i+30)});}
    if(bkCh.length){for(var i=0;i<bkPrices.length;i+=30)await api('/listings/prices','POST',{listing_id:bkCh[0].listing_id,channel_type:bkCh[0].channel_type,prices:bkPrices.slice(i,i+30)});}
    if(r.minStay>0)await api('/listings/restrictions','POST',{property_id:propId,min_nights:r.minStay});
    showToast('✓ '+airPrices.length+' jours synchronisés sur Airbnb + Booking');
  }catch(e){showToast('Partiel : '+e.message);}
  S.ratesLoaded={};renderRates();
}

async function _saveBookingOptions(propId){
  if(!S.ratesRules)S.ratesRules={};
  if(!S.ratesRules[propId])S.ratesRules[propId]={};
  var r=S.ratesRules[propId];
  var opts=['nonref','early','lastmin','weekly'];
  opts.forEach(function(id){
    if(!r[id])r[id]={on:false,pct:10};
    var pctEl=document.getElementById('pct-'+id);
    var daysEl=document.getElementById('days-'+id);
    if(pctEl)r[id].pct=parseInt(pctEl.value)||10;
    if(daysEl)r[id].days=parseInt(daysEl.value)||7;
  });
  S.ratesRules[propId]=r;

  showToast('Sync options Booking…');
  var prop=S.props.find(function(p){return p.id===propId;});
  var bkCh=prop?prop.channels.filter(function(c){return platClass(c.channel_type)==='booking';}):[];
  try{
    if(bkCh.length){
      var promotions=[];
      if(r.nonref&&r.nonref.on)promotions.push({type:'non_refundable',discount:r.nonref.pct});
      if(r.early&&r.early.on)promotions.push({type:'early_bird',discount:r.early.pct,days_in_advance:r.early.days});
      if(r.lastmin&&r.lastmin.on)promotions.push({type:'last_minute',markup:r.lastmin.pct,days_before:r.lastmin.days});
      if(r.weekly&&r.weekly.on)promotions.push({type:'weekly_stay',discount:r.weekly.pct});
      await api('/listings/promotions','POST',{listing_id:bkCh[0].listing_id,promotions:promotions});
    }
    showToast('✓ Options Booking synchronisées');
  }catch(e){
    showToast('Enregistré localement (API: '+e.message+')');
  }
  renderRates();
}


function _aiSuggestPrice(date, propId){
  var d = new Date(date+'T00:00:00');
  var month = d.getMonth(); // 0=jan
  var dow = d.getDay(); // 0=dim
  var isWE = dow===0||dow===5||dow===6;
  var bp = (S.basePrices&&S.basePrices[propId])||{airWeek:80,airWE:95};
  var base = isWE ? bp.airWE : bp.airWeek;
  
  // Coefficients saisonniers pour Perpignan/Languedoc-Roussillon
  var seasonal = [0.75,0.75,0.85,0.90,1.05,1.20,1.50,1.55,1.25,0.90,0.80,0.80];
  var coef = seasonal[month];
  
  // Bonus week-end été
  if(isWE && (month>=5 && month<=8)) coef *= 1.10;
  
  // Événements locaux Perpignan
  var ds = date;
  var events = {
    '2026-07-14':1.3,'2026-07-15':1.3, // Fête nationale
    '2026-08-15':1.2,'2026-08-16':1.2, // Assomption
    '2026-05-01':1.1,'2026-05-08':1.1, // Jours fériés
    '2026-06-21':1.15, // Fête de la musique
  };
  if(events[ds]) coef *= events[ds];
  
  var suggested = Math.round(base * coef / 5) * 5; // Arrondi à 5€
  var diff = suggested - base;
  var pct = Math.round(diff/base*100);
  return {price: suggested, pct: pct, coef: coef};
}

function _rcClick(ds){

    if(S.ratesSelected[ds]){delete S.ratesSelected[ds];}
    else{S.ratesSelected[ds]=true;}
    renderRates();
    return;
  }
  if(S.ratesSelected[ds]){
    delete S.ratesSelected[ds];
    var n2=Object.keys(S.ratesSelected).filter(function(k){return S.ratesSelected[k];}).length;
    if(n2===0){renderRates();_openRateDay(ds,S.ratesProp);return;}

    // Des cases deja selectionnees : ajouter celle-ci
    S.ratesSelected[ds]=true;
  } else {
    // Aucune selection : ouvrir directement
    _openRateDay(ds,S.ratesProp);return;
  }
  renderRates();
}

async function _rSaveBulk(){
  var av=parseInt(document.getElementById('bs-air').value)||0;var bv=parseInt(document.getElementById('bs-bk').value)||0;if(!av&&!bv){showToast('Entre un prix.');return;}
  var opt=document.querySelector('input[name="bs-opt"]:checked');var f=opt&&opt.value==='nonref'?0.85:opt&&opt.value==='early'?0.90:opt&&opt.value==='lastmin'?1.05:1;
  var days=Object.keys(S.ratesSelected).filter(function(k){return S.ratesSelected[k];});closeModal();
  var prop=S.props.find(function(p){return p.id===S.ratesProp;});var aP=[],bP=[];
  days.forEach(function(ds){var k=S.ratesProp+'_'+ds;if(av){S.ratesPrices[k+'_air']=av;aP.push({date:ds,price:av,start_date:ds,end_date:ds});}if(bv){S.ratesPrices[k+'_bk']=Math.round(bv*f);bP.push({date:ds,price:Math.round(bv*f)});}});
  showToast('Envoi…');
  try{var aC=prop?prop.channels.filter(function(c){return platClass(c.channel_type)==='airbnb';}):[];var bC=prop?prop.channels.filter(function(c){return platClass(c.channel_type)==='booking';}):[];if(av&&aC.length){for(var i=0;i<aP.length;i+=30)await api('/listings/prices','POST',{listing_id:aC[0].listing_id,channel_type:aC[0].channel_type,prices:aP.slice(i,i+30)});}if(bv&&bC.length){for(var i=0;i<bP.length;i+=30)await api('/listings/prices','POST',{listing_id:bC[0].listing_id,channel_type:bC[0].channel_type,prices:bP.slice(i,i+30)});}showToast('✓ '+days.length+' jours mis à jour');}catch(e){showToast('Local OK');}
  S.ratesSelected={};renderRates();
}

async function _loadPricesFromAPI(propId){
  var prop=S.props.find(function(p){return p.id===propId;});
  if(!prop||!prop.channels.length){showToast('Aucun channel');return;}
  var m=new Date();
  var from=dStr(new Date(m.getFullYear(),m.getMonth(),1));
  var to=dStr(new Date(m.getFullYear(),m.getMonth()+12,0));
  showToast('Chargement '+prop.channels.length+' canaux...');
  var total=0;
  for(var ci=0;ci<prop.channels.length;ci++){
    var ch=prop.channels[ci];
    var type=platClass(ch.channel_type);
    try{
      var data=await api('/listings/calendar','POST',{listings:[{listing_id:ch.listing_id,channel_type:ch.channel_type}],start_date:from,end_date:to});
      console.log('Prices API response:', JSON.stringify(data).slice(0,200));
      var listings=(data&&data.data&&data.data.listings)||[];
      console.log('Calendar found:', listings.length, 'for', ch.listing_id);
      listings.forEach(function(lst){
        var days=lst.calendar||[];
        days.forEach(function(p){
          if(p.price&&p.date){
            var k=propId+'_'+p.date+'_'+(type==='airbnb'?'air':'bk');if(!S.ratesModified||!S.ratesModified[k])S.ratesPrices[k]=parseInt(p.price);
            total++;
          }
        });
      });
    }catch(e){
      console.error('Error loading prices for',ch.listing_id,e.message);
      showToast('Erreur canal '+type+': '+e.message);
    }
  }
  showToast(total>0?('✓ '+total+' tarifs chargés'):'Aucun tarif retourné par Hostex');
  renderRates();
}

async function _sendAiSuggestion(){
  var convId=window._aiConvId;
  var msg=window._aiSuggestion;
  if(!convId||!msg)return;
  document.getElementById("ai-suggest-box").innerHTML="";
  try{
    await api("/conversations/"+convId,"POST",{message:msg});
    showToast("\u2713 R\u00e9ponse IA envoy\u00e9e");
    openConv(convId);
  }catch(e){showToast("Erreur: "+e.message);}
}

async function sendMsg(convId){
  var input=document.getElementById("msg-input");
  if(!input||!input.value.trim())return;
  var msg=input.value.trim();
  input.value="";
  try{
    await api("/conversations/"+convId,"POST",{message:msg});
    showToast("\u2713 Message envoy\u00e9");
    openConv(convId);
  }catch(e){showToast("Erreur: "+e.message);input.value=msg;}
}

function renderCal(){
  var now=new Date();
  var prop=S.props.find(function(p){return p.id===S.selectedProp;})||S.props[0];
  if(!prop){document.getElementById('main-content').innerHTML='<div style="color:#888;padding:20px">Aucun bien.</div>';return;}
  var MONTHS=['Janvier','F\u00e9vrier','Mars','Avril','Mai','Juin','Juillet','Ao\u00fbt','Septembre','Octobre','Novembre','D\u00e9cembre'];
  var DAYS=['L','M','M','J','V','S','D'];
  var CELL=72,GAP=5;
  function pad(n){return String(n).padStart(2,'0');}
  function ds2(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d);}
  function bookedOn(date){return S.reservations.find(function(r){return r.prop_id===prop.id&&r.check_in<=date&&r.check_out>date&&r.status!=='cancelled';});}
  function getNights(r){return Math.round((new Date(r.check_out)-new Date(r.check_in))/86400000);}

  var propTabs=S.props.map(function(p){
    return '<div onclick="S.selectedProp=\''+p.id+'\';renderCal()" style="font-size:12px;padding:6px 16px;border-radius:20px;border:1px solid '+(p.id===prop.id?'#1D9E75':'var(--color-border-secondary)')+';background:'+(p.id===prop.id?'#0F6E56':'var(--color-background-secondary)')+';color:'+(p.id===prop.id?'#fff':'var(--color-text-secondary)')+';cursor:pointer;white-space:nowrap;">'+p.name+'</div>';
  }).join('');

  var legend='<div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;">'
    +'<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary);"><div style="width:28px;height:8px;border-radius:4px;background:linear-gradient(90deg,#ef4444,#f87171);"></div>Airbnb</div>'
    +'<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary);"><div style="width:28px;height:8px;border-radius:4px;background:linear-gradient(90deg,#3b82f6,#60a5fa);"></div>Booking</div>'
    +'<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary);"><div style="width:10px;height:10px;border-radius:50%;background:#1D9E75;"></div>Aujourd\u2019hui</div>'
    +'</div>';

  function renderMonth(yr,mn){
    var firstDow=(new Date(yr,mn,1).getDay()+6)%7;
    var lastD=new Date(yr,mn+1,0).getDate();
    var rows=Math.ceil((firstDow+lastD)/7);
    var dowRow=DAYS.map(function(d){return'<div style="font-size:10px;color:var(--color-text-tertiary);text-align:center;padding:2px 0;">'+d+'</div>';}).join('');
    var dayCells='';
    for(var i=0;i<firstDow;i++) dayCells+='<div></div>';
    for(var d=1;d<=lastD;d++){
      var date=ds2(yr,mn,d);
      var dateObj=new Date(yr,mn,d);
      var isToday=dateObj.toDateString()===now.toDateString();
      var isPast=dateObj<new Date(now.getFullYear(),now.getMonth(),now.getDate());
      var res=bookedOn(date);
      var isAir=res&&platClass(res.platform)==='airbnb';
      var isBlocked=S.blockedDates&&S.blockedDates.indexOf(date)>=0;var bg=isToday?'#f0fdf8':isBlocked?'#fef2f2':res&&!isPast?(isAir?'#fff1f1':'#eff6ff'):'var(--color-background-primary)';
      var border=isToday?'#1D9E75':isBlocked?'#f87171':res&&!isPast?(isAir?'#fecaca':'#bfdbfe'):'#d1d0c8';
      var numColor=isToday?'#0F6E56':isPast?'var(--color-text-tertiary)':res?(isAir?'#dc2626':'#1d4ed8'):'var(--color-text-primary)';
      var opacity=isPast&&!isToday?'0.55':'1';
      dayCells+='<div style="border-radius:10px;height:'+CELL+'px;padding:7px 6px;border:1.5px solid '+border+';background:'+bg+';position:relative;z-index:1;opacity:'+opacity+';cursor:pointer;" onclick="openResDetail(\''+date+'\')">'
        +'<div style="font-size:12px;font-weight:500;color:'+numColor+';line-height:1;">'+d+'</div>'
        +(isBlocked?'<div style="font-size:14px;text-align:center;margin-top:6px;">⛔</div>':'')
        +'</div>';
    }
    var gridW=(document.getElementById('main-content').getBoundingClientRect().width||390)-2;
    var cellW=(gridW-(GAP*6))/7;
    var bars='';
    S.reservations.filter(function(r){return r.prop_id===prop.id&&r.status!=='cancelled';}).forEach(function(res){
      var platCls=platClass(res.platform)==='airbnb'?'air':'bk';
      var barColor=platCls==='air'?'linear-gradient(90deg,#ef4444,#f87171)':'linear-gradient(90deg,#3b82f6,#60a5fa)';
      var startD=new Date(res.check_in+'T00:00:00');
      var endD=new Date(res.check_out+'T00:00:00');
      var monthStart=new Date(yr,mn,1);
      var monthEndD=new Date(yr,mn+1,0);
      if(endD<=monthStart||startD>monthEndD) return;
      var clampStart=startD<monthStart?monthStart:startD;
      var endDplus1=new Date(endD.getFullYear(),endD.getMonth(),endD.getDate()+1);var clampEnd=endDplus1>new Date(yr,mn+1,0)?new Date(yr,mn+1,1):endDplus1;
      var cur=new Date(clampStart);
      while(cur<clampEnd){
        var idx=firstDow+cur.getDate()-1;
        var rowEndIdx=Math.floor(idx/7)*7+7;
        var rowEndDate=new Date(yr,mn,cur.getDate()+(rowEndIdx-idx));
        if(rowEndDate>clampEnd) rowEndDate=new Date(clampEnd);
        var cellCount=Math.round((rowEndDate-cur)/86400000);
        var col=idx%7;
        var row=Math.floor(idx/7);
        var isResStart=cur.toDateString()===startD.toDateString();
        var isResEnd=rowEndDate>=endDplus1&&!isResStart||rowEndDate>=endDplus1&&isResStart&&cellCount>1;
        var leftBase=col*(cellW+GAP);
        var left=isResStart?leftBase+cellW/2:leftBase;
        var rawW=cellCount*(cellW+GAP)-GAP;
        var width=rawW-(isResStart?cellW/2:0)-(isResEnd?cellW/2:0);
        var top=row*(CELL+GAP)+CELL-20;
        var nights=Math.round((endD-startD)/86400000);
        var platLbl=platClass(res.platform)==='airbnb'?'AIR':'BK';var label=isResStart?(res.guest.split(' ')[0]+' \u00b7 '+nights+'n \u00b7 '+platLbl):'';
        var br=isResStart&&isResEnd?'6px':isResStart?'6px 0 0 6px':isResEnd?'0 6px 6px 0':'0';
        bars+='<div style="position:absolute;height:18px;border-radius:'+br+';z-index:2;display:flex;align-items:center;padding:0 6px;font-size:11px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;pointer-events:none;box-shadow:0 2px 6px rgba(0,0,0,.15);background:'+barColor+';left:'+left+'px;top:'+top+'px;width:'+width+'px;">'+label+'</div>';
        cur=rowEndDate;
      }
    });
    var gridH=rows*(CELL+GAP)-GAP;
    return '<div style="margin-bottom:28px;">'
      +'<div style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;">'+MONTHS[mn]+' '+yr+'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px;">'+dowRow+'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;position:relative;height:'+gridH+'px;">'+dayCells+bars+'</div>'
      +'</div>';
  }

  var months='';
  for(var mo=0;mo<7;mo++){
    var mDate=new Date(now.getFullYear(),now.getMonth()+mo,1);
    months+=renderMonth(mDate.getFullYear(),mDate.getMonth());
  }

  document.getElementById('main-content').innerHTML=
    '<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">'+propTabs+'</div>'
    +legend
    +months;
}

async function _rSaveDay(ds,propId){
  var av=parseInt(document.getElementById('r-air').value)||0;var bv=parseInt(document.getElementById('r-bk').value)||0;var msv=parseInt(document.getElementById('r-ms').value)||0;
  var opt=document.querySelector('input[name="bk-opt"]:checked');var f=opt&&opt.value==='nonref'?0.85:opt&&opt.value==='early'?0.90:opt&&opt.value==='lastmin'?1.05:1;
  var key=propId+'_'+ds;if(!S.ratesModified)S.ratesModified={};if(av){S.ratesPrices[key+'_air']=av;S.ratesModified[key+'_air']=true;}if(bv){S.ratesPrices[key+'_bk']=Math.round(bv*f);S.ratesModified[key+'_bk']=true;}if(msv)S.ratesMinStay[key]=msv;
  closeModal();showToast('Envoi…');
  var prop=S.props.find(function(p){return p.id===propId;});
  try{for(var i=0;i<(prop?prop.channels.length:0);i++){var ch=prop.channels[i];var price=platClass(ch.channel_type)==='airbnb'?av:Math.round(bv*f);if(price>0)await api('/listings/prices','POST',{listing_id:ch.listing_id,channel_type:ch.channel_type,prices:[{date:ds,price:price,start_date:ds,end_date:ds}]});}if(msv>0)await api('/listings/restrictions','POST',{property_id:propId,min_nights:msv,start_date:ds,end_date:ds});showToast('✓ Tarifs mis à jour');}catch(e){showToast('Local OK');}
  renderRates();
}

function _rApplyRange(ds,propId,days){
  var av=parseInt(document.getElementById('r-air').value)||0;var bv=parseInt(document.getElementById('r-bk').value)||0;
  var opt=document.querySelector('input[name="bk-opt"]:checked');var f=opt&&opt.value==='nonref'?0.85:opt&&opt.value==='early'?0.90:opt&&opt.value==='lastmin'?1.05:1;
  var start=new Date(ds+'T00:00:00');for(var i=0;i<days;i++){var d=new Date(start.getFullYear(),start.getMonth(),start.getDate()+i);var k=propId+'_'+dStr(d);if(av)S.ratesPrices[k+'_air']=av;if(bv)S.ratesPrices[k+'_bk']=Math.round(bv*f);}
  _rSaveDay(ds,propId);
}

function _rateApplySelected(){
  var days=Object.keys(S.ratesSelected).filter(function(k){return S.ratesSelected[k];}).sort();if(!days.length)return;
  var BK_OPTIONS=[{id:'standard',label:'Tarif standard',desc:'Annulation 48h',factor:1},{id:'nonref',label:'Non remboursable',desc:'-15%',factor:0.85},{id:'early',label:'Anticipée',desc:'-10%',factor:0.90},{id:'lastmin',label:'Dernière minute',desc:'+5%',factor:1.05}];
  showModal('<h3>Tarif sur '+days.length+' jour'+(days.length>1?'s':'')+'</h3>'
    +'<div style="font-size:10px;color:#888;margin-bottom:12px;line-height:1.8;">'+days.join(' · ')+'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">'
      +'<div style="padding:12px;background:#FFF5F5;border-radius:8px;"><div style="background:#FF385C;border-radius:4px;padding:2px 8px;font-size:11px;color:#fff;font-weight:700;display:inline-block;margin-bottom:10px;">Airbnb</div><div style="display:flex;align-items:baseline;gap:4px;"><input type="number" id="bs-air" placeholder="€" style="font-size:22px;width:80px;border:none;background:transparent;font-weight:500;outline:none;padding:0;"><span style="font-size:14px;color:#888;">€/nuit</span></div></div>'
      +'<div style="padding:12px;background:#F0F4FF;border-radius:8px;"><div style="background:#003580;border-radius:4px;padding:2px 8px;font-size:11px;color:#fff;font-weight:700;display:inline-block;margin-bottom:10px;">Booking</div><div style="display:flex;align-items:baseline;gap:4px;"><input type="number" id="bs-bk" placeholder="€" style="font-size:22px;width:80px;border:none;background:transparent;font-weight:500;outline:none;padding:0;"><span style="font-size:14px;color:#888;">€/nuit</span></div></div>'
    +'</div>'
    +'<div style="margin-bottom:12px;"><div style="font-size:11px;font-weight:600;color:#666;margin-bottom:6px;">Option Booking</div><div style="display:grid;gap:4px;">'+BK_OPTIONS.map(function(o){return'<label style="display:flex;align-items:center;gap:8px;padding:6px 10px;border:0.5px solid #e5e4e0;border-radius:6px;cursor:pointer;background:#fff;"><input type="radio" name="bs-opt" value="'+o.id+'" '+(o.id==='standard'?'checked':'')+' style="margin:0;"><div><div style="font-size:11px;font-weight:600;">'+o.label+'</div><div style="font-size:10px;color:#888;">'+o.desc+'</div></div></label>';}).join('')+'</div></div>'
    +'<div class="modal-actions"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn btn-green" onclick="_rSaveBulk()">✓ Appliquer sur '+days.length+' jours</button></div>');
}

async function _rSaveBulk(){
  var av=parseInt(document.getElementById('bs-air').value)||0;var bv=parseInt(document.getElementById('bs-bk').value)||0;if(!av&&!bv){showToast('Entre un prix.');return;}
  var opt=document.querySelector('input[name="bs-opt"]:checked');var f=opt&&opt.value==='nonref'?0.85:opt&&opt.value==='early'?0.90:opt&&opt.value==='lastmin'?1.05:1;
  var days=Object.keys(S.ratesSelected).filter(function(k){return S.ratesSelected[k];});closeModal();
  var prop=S.props.find(function(p){return p.id===S.ratesProp;});var aP=[],bP=[];
  days.forEach(function(ds){var k=S.ratesProp+'_'+ds;if(av){S.ratesPrices[k+'_air']=av;aP.push({date:ds,price:av,start_date:ds,end_date:ds});}if(bv){S.ratesPrices[k+'_bk']=Math.round(bv*f);bP.push({date:ds,price:Math.round(bv*f)});}});
  showToast('Envoi…');
  try{var aC=prop?prop.channels.filter(function(c){return platClass(c.channel_type)==='airbnb';}):[];var bC=prop?prop.channels.filter(function(c){return platClass(c.channel_type)==='booking';}):[];if(av&&aC.length){for(var i=0;i<aP.length;i+=30)await api('/listings/prices','POST',{listing_id:aC[0].listing_id,channel_type:aC[0].channel_type,prices:aP.slice(i,i+30)});}if(bv&&bC.length){for(var i=0;i<bP.length;i+=30)await api('/listings/prices','POST',{listing_id:bC[0].listing_id,channel_type:bC[0].channel_type,prices:bP.slice(i,i+30)});}showToast('✓ '+days.length+' jours mis à jour');}catch(e){showToast('Local OK');}
  S.ratesSelected={};renderRates();
}


function _showYearDetail(){var e=document.getElementById('yd');if(e)e.style.display=e.style.display==='none'?'block':'none';}
function _showOccDetail(){var e=document.getElementById('od');if(e)e.style.display=e.style.display==='none'?'block':'none';}
function _gm(m,y){S.currentMonth=new Date(y,m,1);S.page='calendar';render();}

function _drawDash(m12,pData,tot){
  var c=document.getElementById('chart-rev');
  if(!c)return;
  var maxRv=Math.max.apply(null,m12.map(function(m){return m.rv||0;}));if(!maxRv)maxRv=1;
  var now=new Date();
  var bars=m12.map(function(m){
    var pct=Math.round(m.rv/maxRv*100);
    var isCur=(m.month===now.getMonth()&&m.year===now.getFullYear());
    return '<div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:2px;">'
      +'<div style="font-size:8px;color:#888;text-align:center;">'+(m.rv>0?Math.round(m.rv/1000*10)/10+'k':'')+'</div>'
      +'<div style="flex:1;width:80%;display:flex;align-items:flex-end;cursor:pointer;" onclick="_gm('+m.month+','+m.year+')" title="'+m.lbl+'">'
        +'<div style="width:100%;background:'+(isCur?'#1D9E75':'#A8D5C2')+';border-radius:2px 2px 0 0;height:'+Math.max(pct,2)+'%;min-height:3px;"></div>'
      +'</div>'
      +'<div style="font-size:8px;color:'+(isCur?'#1D9E75':'#aaa')+';font-weight:'+(isCur?700:400)+';">'+m.lbl.split(' ')[0]+'</div>'
    +'</div>';
  }).join('');
  var div=document.createElement('div');div.id='chart-rev';
  div.style.cssText='display:flex;gap:2px;height:180px;align-items:stretch;padding:4px 0;width:100%;';
  div.innerHTML=bars;c.parentNode.replaceChild(div,c);
  var c2=document.getElementById('chart-plat');if(!c2)return;
  var PC={'airbnb':'#E8604C','booking':'#3A5A8C','booking.com':'#3A5A8C','direct':'#4A8C7A'};
  var r=55,ri=32,cx=70,cy=70,ang=-Math.PI/2;
  var slices=pData.map(function(d){
    var sl=d.count/tot*2*Math.PI;
    var x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang),x2=cx+r*Math.cos(ang+sl),y2=cy+r*Math.sin(ang+sl);
    var xi1=cx+ri*Math.cos(ang),yi1=cy+ri*Math.sin(ang),xi2=cx+ri*Math.cos(ang+sl),yi2=cy+ri*Math.sin(ang+sl);
    var lg=sl>Math.PI?1:0;
    var path='M'+x1+','+y1+' A'+r+','+r+' 0 '+lg+',1 '+x2+','+y2+' L'+xi2+','+yi2+' A'+ri+','+ri+' 0 '+lg+',0 '+xi1+','+yi1+' Z';
    ang+=sl;return '<path d="'+path+'" fill="'+(PC[d.pl]||'#ccc')+'" stroke="#fff" stroke-width="2"/>';
  }).join('');
  var svg=document.createElement('div');svg.id='chart-plat';
  svg.innerHTML='<svg viewBox="0 0 140 140" width="120" height="120" style="display:block;margin:0 auto;">'+slices+'<circle cx="'+cx+'" cy="'+cy+'" r="'+ri+'" fill="#fff"/><text x="'+cx+'" y="'+(cy+4)+'" text-anchor="middle" style="font-size:10px;font-weight:700;fill:#1a1a1a;">'+tot+'</text><text x="'+cx+'" y="'+(cy+16)+'" text-anchor="middle" style="font-size:8px;fill:#888;">res.</text></svg>';
  c2.parentNode.replaceChild(svg,c2);
  var leg=document.getElementById('pleg');
  if(leg)leg.innerHTML=pData.map(function(d){return'<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;"><span style="width:10px;height:10px;border-radius:2px;background:'+(PC[d.pl]||'#ccc')+';display:inline-block;"></span><span style="font-size:11px;font-weight:500;">'+platLabel(d.pl)+'</span><span style="font-size:10px;color:#888;margin-left:auto;">'+d.count+' - '+Math.round(d.rev)+'€</span></div>';}).join('');
}

function _fp(pl){S.resFilter=pl==='airbnb'?'Airbnb':pl==='booking'||pl==='booking.com'?'Booking':'Direct';S.page='reservations';render();}


document.addEventListener("DOMContentLoaded",function(){loadAll();});
